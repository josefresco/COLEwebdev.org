<style>
/* ── Sitemap page (sm-) ── */
.sm-hero {
  position: relative;
  overflow: hidden;
  min-height: 28vh;
  display: flex;
  align-items: center;
}
.sm-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 50% 55% at 100% 0%, rgba(33,146,188,0.15), transparent 55%),
    radial-gradient(ellipse 45% 50% at 0% 100%, rgba(14,42,74,0.22), transparent 55%),
    linear-gradient(145deg, #061828 0%, #0E2A4A 100%);
}
.sm-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,0.012) 79px, rgba(255,255,255,0.012) 80px),
    repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.012) 79px, rgba(255,255,255,0.012) 80px);
}
.sm-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 72px 0 56px;
}
.sm-eyebrow { color: rgba(255,255,255,0.5); }
.sm-hero-hl {
  font-family: var(--serif);
  font-size: clamp(36px, 5.5vw, 64px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 14px;
  letter-spacing: -1px;
}
.sm-hero-sub {
  font-size: 16px;
  line-height: 1.6;
  color: rgba(255,255,255,0.55);
  margin: 0;
}
.sm-body {
  padding: var(--pad-section) 0;
  background: var(--paper);
}
.sm-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 48px 64px;
}
.sm-section-hl {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--brand-blue);
  margin: 0 0 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
}
.sm-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sm-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 10px 12px;
  border-radius: var(--r-md);
  transition: background 0.15s;
}
.sm-item:hover { background: var(--paper-2); }
.sm-link {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  text-decoration: none;
  transition: color 0.15s;
}
.sm-link:hover { color: var(--brand-blue); }
.sm-desc {
  font-size: 12.5px;
  color: var(--muted);
  line-height: 1.45;
}
@media (max-width: 760px) {
  .sm-grid { grid-template-columns: 1fr; gap: 40px; }
}
</style>
