<style>
/* ── Marketing Services page (mkg-) ── */

/* Hero */
.mkg-hero {
  position: relative;
  overflow: hidden;
  min-height: 56vh;
  display: flex;
  align-items: center;
}
.mkg-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 70% at 110% 0%, rgba(242,107,31,0.28), transparent 50%),
    radial-gradient(ellipse 50% 60% at -10% 100%, rgba(123,192,67,0.18), transparent 55%),
    linear-gradient(150deg, #0A1F36 0%, #0E2A4A 55%, #122E52 100%);
}
.mkg-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
}
.mkg-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 100px 0 88px;
}
.mkg-eyebrow { color: rgba(255,255,255,0.55); }
.mkg-hero-hl {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 76px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1px;
}
.mkg-hero-hl em { color: #F26B1F; font-style: italic; }
.mkg-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.7);
  max-width: 580px;
  margin: 0 0 36px;
}
.mkg-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.mkg-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
.mkg-ghost:hover { border-color: rgba(255,255,255,0.7); color: white; }
.mkg-hero-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 40px; }
.mkg-hero-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 5px 12px;
  border-radius: 999px;
}

/* Services overview grid */
.mkg-services {
  padding: 88px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.mkg-services-hd { margin-bottom: 52px; max-width: 680px; }
.mkg-services-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 16px;
}
.mkg-services-sub { font-size: 15px; line-height: 1.7; color: var(--ink-2); margin: 0; }
.mkg-services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.mkg-service-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s, box-shadow 0.22s;
  text-decoration: none;
  color: inherit;
}
.mkg-service-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.mkg-service-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: grid; place-items: center; font-size: 18px; flex-shrink: 0;
}
.mkg-service-title { font-family: var(--serif); font-size: 21px; color: var(--ink); font-weight: 400; }
.mkg-service-desc { font-size: 13.5px; line-height: 1.65; color: var(--ink-2); }

/* Channel sections */
.mkg-channel {
  padding: 88px 0;
  background: white;
  border-top: 1px solid var(--line);
}
.mkg-channel--alt { background: var(--paper); }
.mkg-channel-hd {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: start;
  gap: 40px;
  margin-bottom: 36px;
}
.mkg-channel-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
  line-height: 1.1;
}
.mkg-channel-hl em { font-style: italic; color: var(--brand-green); }
.mkg-channel-intro {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-2);
  margin: 0 0 52px;
  max-width: 780px;
}
.mkg-channel-body {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-2);
  margin: 0 0 20px;
}
.mkg-channel-list {
  font-size: 14px;
  line-height: 1.8;
  color: var(--ink-2);
  padding-left: 18px;
  margin: 0;
}
.mkg-channel-list li { margin-bottom: 4px; }

/* SEO sub-section */
.mkg-seo-stats {
  display: flex;
  flex-direction: column;
  gap: 16px;
  flex-shrink: 0;
  min-width: 200px;
}
.mkg-seo-stat {
  background: white;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.mkg-channel--alt .mkg-seo-stat { background: var(--paper-2); }
.mkg-seo-num {
  font-family: var(--serif);
  font-size: 30px;
  color: var(--brand-green);
  font-style: italic;
  line-height: 1;
}
.mkg-seo-lbl { font-size: 12px; color: var(--ink-2); line-height: 1.4; }
.mkg-seo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 48px;
}
.mkg-seo-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 24px 20px;
}
.mkg-seo-icon {
  font-size: 20px;
  margin-bottom: 12px;
  color: var(--brand-green);
}
.mkg-seo-name { font-size: 14px; font-weight: 600; color: var(--ink); margin: 0 0 8px; }
.mkg-seo-body { font-size: 13px; line-height: 1.65; color: var(--ink-2); margin: 0; }
.mkg-seo-steps { border-top: 1px solid var(--line); padding-top: 40px; }
.mkg-seo-steps-hl {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  color: var(--ink);
  margin: 0 0 28px;
}
.mkg-seo-steps-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.mkg-seo-step-n {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--brand-green);
  margin-bottom: 6px;
}
.mkg-seo-step-label { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
.mkg-seo-step-body { font-size: 13px; line-height: 1.65; color: var(--ink-2); margin: 0; }

/* Paid Search sub-section */
.mkg-paid-grid {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 64px;
  align-items: start;
}
.mkg-paid-list {
  font-size: 14px;
  line-height: 1.9;
  color: var(--ink-2);
  padding-left: 18px;
  margin: 20px 0 0;
}
.mkg-paid-aside { display: flex; flex-direction: column; gap: 16px; }
.mkg-paid-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 24px 28px;
}
.mkg-paid-card--green { background: var(--navy); border-color: var(--navy); }
.mkg-paid-card-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-2);
  margin-bottom: 6px;
}
.mkg-paid-card--green .mkg-paid-card-label { color: rgba(255,255,255,0.55); }
.mkg-paid-card-num {
  font-family: var(--serif);
  font-size: 42px;
  color: var(--brand-green);
  font-style: italic;
  line-height: 1;
  margin-bottom: 6px;
}
.mkg-paid-card--green .mkg-paid-card-num { color: #7BC043; }
.mkg-paid-card-sub { font-size: 12px; color: var(--ink-2); line-height: 1.4; }
.mkg-paid-card--green .mkg-paid-card-sub { color: rgba(255,255,255,0.5); }

/* Social + Leads two-col */
.mkg-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
}
.mkg-two-hl {
  font-family: var(--serif);
  font-size: clamp(22px, 2.8vw, 34px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 16px;
  line-height: 1.15;
}
.mkg-two-hl em { font-style: italic; color: var(--brand-green); }

/* Analytics */
.mkg-analytics-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
.mkg-analytics-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 28px 24px;
  display: flex;
  gap: 16px;
}
.mkg-analytics-icon {
  font-size: 22px;
  color: var(--brand-green);
  flex-shrink: 0;
  margin-top: 2px;
}
.mkg-analytics-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
.mkg-analytics-body { font-size: 13px; line-height: 1.65; color: var(--ink-2); margin: 0; }

/* Why us */
.mkg-why {
  padding: 88px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.mkg-why-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: start; }
.mkg-why-eyebrow { color: var(--muted); }
.mkg-why-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 24px;
  line-height: 1.15;
}
.mkg-why-body { font-size: 15px; line-height: 1.75; color: var(--ink-2); margin: 0 0 18px; }
.mkg-why-right { display: flex; flex-direction: column; gap: 2px; }
.mkg-reason {
  display: flex;
  gap: 20px;
  padding: 22px 24px;
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  align-items: flex-start;
}
.mkg-reason-n {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--brand-green);
  flex-shrink: 0;
  padding-top: 3px;
}
.mkg-reason-title { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 5px; }
.mkg-reason-body { font-size: 13px; line-height: 1.6; color: var(--ink-2); }

/* Stats band */
.mkg-stats { background: var(--navy); padding: 56px 0; }
.mkg-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
.mkg-stat {
  padding: 24px 40px;
  border-right: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.mkg-stat:last-child { border-right: none; }
.mkg-stat-num {
  font-family: var(--serif);
  font-size: clamp(36px, 4.5vw, 56px);
  color: #F26B1F;
  font-style: italic;
  line-height: 1;
}
.mkg-stat-label { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.45; max-width: 200px; }

/* CTA */
.mkg-cta { padding: 80px 0; background: var(--navy); border-top: 1px solid rgba(255,255,255,0.08); }
.mkg-cta-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r-xl);
  padding: 52px 60px;
}
.mkg-cta-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 38px);
  color: white;
  font-weight: 400;
  font-style: italic;
  margin: 0 0 10px;
}
.mkg-cta-sub { font-size: 15px; color: rgba(255,255,255,0.6); margin: 0; max-width: 420px; }
.mkg-cta-guides { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
.mkg-cta-guides-label { font-size: 11px; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
.mkg-cta-guide-link { font-size: 13px; color: rgba(255,255,255,0.7); text-decoration: none; }
.mkg-cta-guide-link:hover { color: white; }
.mkg-cta-actions { display: flex; gap: 14px; flex-wrap: wrap; flex-shrink: 0; }

/* Responsive */
@media (max-width: 1024px) {
  .mkg-channel-hd { grid-template-columns: 1fr; }
  .mkg-seo-stats { flex-direction: row; flex-wrap: wrap; }
  .mkg-seo-stat { flex: 1; min-width: 140px; }
  .mkg-paid-grid { grid-template-columns: 1fr; }
  .mkg-paid-aside { flex-direction: row; }
  .mkg-paid-card { flex: 1; }
}
@media (max-width: 900px) {
  .mkg-seo-grid { grid-template-columns: repeat(2, 1fr); }
  .mkg-seo-steps-grid { grid-template-columns: repeat(2, 1fr); }
  .mkg-two-col { grid-template-columns: 1fr; gap: 48px; }
  .mkg-analytics-grid { grid-template-columns: 1fr; }
  .mkg-why-grid { grid-template-columns: 1fr; gap: 48px; }
  .mkg-stats-grid { grid-template-columns: 1fr; }
  .mkg-stat { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .mkg-stat:last-child { border-bottom: none; }
  .mkg-cta-inner { padding: 40px 32px; flex-direction: column; align-items: flex-start; }
}
@media (max-width: 700px) {
  .mkg-services-grid { grid-template-columns: repeat(2, 1fr); }
  .mkg-seo-grid { grid-template-columns: 1fr; }
  .mkg-seo-steps-grid { grid-template-columns: 1fr 1fr; }
  .mkg-paid-aside { flex-direction: column; }
}
@media (max-width: 480px) {
  .mkg-services-grid { grid-template-columns: 1fr; }
  .mkg-seo-steps-grid { grid-template-columns: 1fr; }
  .mkg-hero-actions { flex-direction: column; align-items: flex-start; }
}
