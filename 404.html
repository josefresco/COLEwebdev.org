<style>
/* ── 404 page (nf-) ── */
.nf-hero {
  position: relative;
  overflow: hidden;
  min-height: 60vh;
  display: flex;
  align-items: center;
}
.nf-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 60% at 10% 50%, rgba(14,42,74,0.6), transparent 60%),
    radial-gradient(ellipse 45% 50% at 90% 20%, rgba(92,192,53,0.1), transparent 55%),
    linear-gradient(145deg, #061828 0%, #0E2A4A 100%);
}
.nf-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,0.012) 79px, rgba(255,255,255,0.012) 80px),
    repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.012) 79px, rgba(255,255,255,0.012) 80px);
}
.nf-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 80px 0 80px;
}
.nf-inner {
  display: flex;
  align-items: center;
  gap: 56px;
}
.nf-code {
  font-family: var(--mono);
  font-size: clamp(96px, 14vw, 180px);
  font-weight: 500;
  line-height: 1;
  color: rgba(255,255,255,0.06);
  user-select: none;
  flex-shrink: 0;
  letter-spacing: -4px;
}
.nf-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 4vw, 48px);
  line-height: 1.1;
  color: white;
  font-weight: 400;
  margin: 10px 0 14px;
  letter-spacing: -0.5px;
}
.nf-sub {
  font-size: 16px;
  line-height: 1.65;
  color: rgba(255,255,255,0.55);
  margin: 0 0 28px;
  max-width: 440px;
}
.nf-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
/* Links section */
.nf-links-section {
  padding: var(--pad-section) 0;
  background: var(--paper);
}
.nf-links-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 0 0 20px;
}
.nf-links-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.nf-link-card {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 18px 20px;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  text-decoration: none;
  transition: background 0.15s, border-color 0.15s;
}
.nf-link-card:hover {
  background: var(--paper-2);
  border-color: var(--brand-blue);
}
.nf-link-glyph {
  font-size: 18px;
  color: var(--brand-green);
  flex-shrink: 0;
  margin-top: 2px;
}
.nf-link-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 3px;
}
.nf-link-desc {
  font-size: 12.5px;
  color: var(--muted);
  line-height: 1.45;
}
@media (max-width: 860px) {
  .nf-inner { flex-direction: column; gap: 24px; text-align: center; }
  .nf-code { font-size: 96px; }
  .nf-sub { margin-left: auto; margin-right: auto; }
  .nf-actions { justify-content: center; }
}
@media (max-width: 640px) {
  .nf-links-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 400px) {
  .nf-links-grid { grid-template-columns: 1fr; }
}
</style>
