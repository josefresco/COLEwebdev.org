    { "@type": "ListItem", "position": 3, "name": "Traditional Web Design", "url": "https://colewebdev.org/traditional.html" },
    { "@type": "ListItem", "position": 4, "name": "E-Commerce", "url": "https://colewebdev.org/ecommerce.html" },
    { "@type": "ListItem", "position": 5, "name": "SEO & Local Search", "url": "https://colewebdev.org/seo.html" },
    { "@type": "ListItem", "position": 6, "name": "Website Hosting + Care Plans", "url": "https://colewebdev.org/hosting.html" },
    { "@type": "ListItem", "position": 7, "name": "Branding", "url": "https://colewebdev.org/branding.html" },

<style>
/* ── Services page ── */

/* Hero */
.svc-hero {
  display: flex;
  flex-direction: column;
}
.svc-hero-img {
  height: 48vh;
  min-height: 280px;
  background-image: url('https://www.colewebdev.com/wp-content/uploads/2020/05/colewebdev-website-design-build-cape-cod-modern-mountains-1.jpg');
  background-size: cover;
  background-position: center center;
  position: relative;
  flex-shrink: 0;
  transform: scale(1.03);
  transition: transform 8s ease;
}
.svc-hero-img.loaded { transform: scale(1); }
.svc-hero-img::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, var(--paper));
}
.svc-hero-text {
  background: var(--paper);
  padding: 52px 0 64px;
}
.svc-hero-hl {
  font-family: var(--serif);
  font-size: clamp(36px, 5vw, 68px);
  line-height: 1.1;
  margin: 16px 0 20px;
  font-weight: 400;
  color: var(--ink);
  max-width: 18ch;
}
.svc-hero-hl em { font-style: italic; color: var(--brand-blue); }
.svc-hero-sub {
  font-size: clamp(15px, 1.6vw, 17px);
  color: var(--muted);
  max-width: 54ch;
  line-height: 1.7;
  margin: 0;
}

/* Service item sections */
.svc-item {
  padding: var(--pad-section) 0;
  position: relative;
  overflow: hidden;
}
.svc-item:nth-child(even) { background: white; }

.svc-item-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 72px;
  align-items: center;
}
.svc-item:nth-child(even) .svc-item-inner { direction: rtl; }
.svc-item:nth-child(even) .svc-item-text { direction: ltr; }
.svc-item:nth-child(even) .svc-item-media { direction: ltr; }

/* Watermark number */
.svc-watermark {
  position: absolute;
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(160px, 22vw, 280px);
  line-height: 1;
  color: var(--navy);
  opacity: 0.04;
  top: -20px;
  right: -20px;
  pointer-events: none;
  user-select: none;
  letter-spacing: -8px;
}
.svc-item:nth-child(even) .svc-watermark { right: auto; left: -20px; }

/* Text block */
.svc-item-text {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.svc-item-eyebrow {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.svc-item-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--brand-blue);
}
.svc-item-name {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-2);
}
.svc-item-tag {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: var(--brand-green);
  color: white;
  padding: 3px 8px;
  border-radius: 999px;
}
.svc-item-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 42px);
  line-height: 1.18;
  margin: 0 0 20px;
  color: var(--ink);
  font-weight: 400;
}
.svc-item-body {
  font-size: clamp(15px, 1.4vw, 16px);
  line-height: 1.75;
  color: var(--ink-2);
  max-width: 46ch;
  margin: 0 0 16px;
}
.svc-item-detail {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 24px;
}
.svc-item-link {
  align-self: flex-start;
  font-size: 14px;
}

/* Media block */
.svc-item-media {
  position: relative;
}
.svc-item-img {
  width: 100%;
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-lg);
  display: block;
  aspect-ratio: 4/3;
  object-fit: cover;
}
.svc-item-icon-badge {
  position: absolute;
  bottom: -16px;
  right: -16px;
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: var(--paper);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-md);
  display: grid;
  place-items: center;
  font-size: 22px;
  color: var(--brand-blue);
}
.svc-item:nth-child(even) .svc-item-icon-badge {
  right: auto;
  left: -16px;
}

/* CTA */
.svc-cta-section { padding: var(--pad-section) 0; }
.svc-cta {
  background: var(--ink);
  border-radius: var(--r-xl);
  padding: 64px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 40px;
  align-items: center;
}
.svc-cta-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: white;
  margin: 0 0 12px;
  font-weight: 400;
}
.svc-cta-hl em { font-style: italic; color: var(--brand-green); }
.svc-cta-sub {
  color: rgba(255,255,255,0.65);
  font-size: 15px;
  line-height: 1.65;
  max-width: 48ch;
  margin: 0;
}
.svc-cta-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

/* Service page cards */
.svc-pages {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.svc-pages-hd { margin-bottom: 36px; }
.svc-pages-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 2.8vw, 36px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.svc-pages-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.svc-page-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 20px 18px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  text-decoration: none;
  transition: border-color 0.18s, box-shadow 0.18s, transform 0.18s;
}
.svc-page-card:hover {
  border-color: var(--brand-blue);
  box-shadow: var(--shadow-sm);
  transform: translateY(-2px);
}
.svc-page-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  display: grid;
  place-items: center;
  font-size: 15px;
  flex-shrink: 0;
}
.svc-page-icon--green { background: rgba(123,192,67,0.14); color: #5DA02E; }
.svc-page-icon--navy  { background: rgba(14,42,74,0.10);   color: #0E2A4A; }
.svc-page-icon--blue  { background: rgba(108,142,191,0.14); color: #4A72A8; }
.svc-page-icon--orange { background: rgba(242,107,31,0.12); color: #D45A10; }
.svc-page-body { flex: 1; min-width: 0; }
.svc-page-name {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.3;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.svc-page-pill {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--brand-green);
  color: white;
  padding: 2px 7px;
  border-radius: 999px;
}
.svc-page-desc {
  font-size: 12px;
  line-height: 1.5;
  color: var(--ink-2);
  margin-top: 4px;
}
.svc-page-arrow {
  font-size: 14px;
  color: var(--muted);
  flex-shrink: 0;
  margin-top: 1px;
  transition: color 0.18s, transform 0.18s;
}
.svc-page-card:hover .svc-page-arrow {
  color: var(--brand-blue);
  transform: translateX(3px);
}

/* Responsive */
@media (max-width: 960px) {
  .svc-item-inner {
    grid-template-columns: 1fr;
    gap: 36px;
    direction: ltr !important;
  }
  .svc-item:nth-child(even) .svc-item-text { direction: ltr; }
  .svc-item-icon-badge { bottom: -12px; right: -12px; }
  .svc-item:nth-child(even) .svc-item-icon-badge { left: -12px; right: auto; }
  .svc-pages-grid { grid-template-columns: repeat(2, 1fr); }
  .svc-cta { grid-template-columns: 1fr; }
  .svc-cta-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
}
@media (max-width: 560px) {
  .svc-cta { padding: 36px 28px; }
  .svc-hero-img { height: 36vh; }
  .svc-pages-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
