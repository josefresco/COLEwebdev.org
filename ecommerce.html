<style>
/* ── E-Commerce page ── */

.ec-hero {
  position: relative;
  overflow: hidden;
  min-height: 56vh;
  display: flex;
  align-items: center;
}
.ec-hero-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 40%;
  display: block;
}
.ec-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 105% -5%, rgba(93,160,46,0.22), transparent 55%),
    radial-gradient(ellipse 60% 70% at -5% 105%, rgba(242,107,31,0.15), transparent 55%),
    linear-gradient(150deg, rgba(6,14,26,0.90) 0%, rgba(14,42,74,0.86) 55%, rgba(18,34,68,0.90) 100%);
}
.ec-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.02) 59px, rgba(255,255,255,0.02) 60px),
    repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.02) 59px, rgba(255,255,255,0.02) 60px);
}
.ec-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 100px 0 80px;
}
.ec-eyebrow { color: rgba(255,255,255,0.6); }
.ec-hero-hl {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 76px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1px;
}
.ec-hero-hl em { color: #7BC043; font-style: italic; }
.ec-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.72);
  max-width: 540px;
  margin: 0 0 36px;
}
.ec-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.ec-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
.ec-ghost:hover { border-color: rgba(255,255,255,0.7); color: white; }
.ec-platform-tags {
  display: flex;
  gap: 10px;
  margin-top: 36px;
  flex-wrap: wrap;
}
.ec-platform-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7);
}

/* Platforms */
.ec-platforms {
  padding: 80px 0;
  background: var(--paper);
}
.ec-platforms-hd { margin-bottom: 48px; }
.ec-platforms-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.ec-platforms-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.ec-platform-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 36px;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.ec-platform-name {
  font-family: var(--serif);
  font-size: 28px;
  color: var(--ink);
  font-weight: 400;
}
.ec-platform-desc {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-2);
}
.ec-platform-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ec-platform-list li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13.5px;
  color: var(--ink-2);
}
.ec-platform-list li::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--brand-green);
  flex-shrink: 0;
}
.ec-platform-tag-strip {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  padding-top: 16px;
  border-top: 1px solid var(--line);
}

/* What we handle */
.ec-features {
  padding: 80px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.ec-features-hd { margin-bottom: 48px; }
.ec-features-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.ec-features-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}
.ec-feat-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ec-feat-icon {
  width: 42px;
  height: 42px;
  border-radius: 11px;
  display: grid;
  place-items: center;
  font-size: 17px;
  flex-shrink: 0;
}
.ec-feat-title {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--ink);
  font-weight: 400;
}
.ec-feat-body {
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink-2);
}

/* Payments & forms */
.ec-pay {
  padding: 80px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.ec-pay-hd { margin-bottom: 48px; }
.ec-pay-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.ec-pay-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.ec-pay-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
}
.ec-pay-card-head {
  padding: 32px 32px 24px;
  border-bottom: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.ec-pay-icon {
  width: 48px;
  height: 48px;
  border-radius: 13px;
  display: grid;
  place-items: center;
  font-size: 20px;
  flex-shrink: 0;
}
.ec-pay-name {
  font-family: var(--serif);
  font-size: 26px;
  color: var(--ink);
  font-weight: 400;
}
.ec-pay-desc {
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink-2);
}
.ec-pay-list {
  list-style: none;
  padding: 24px 32px;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}
.ec-pay-list li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13.5px;
  color: var(--ink-2);
}
.ec-pay-list li::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--brand-green);
  flex-shrink: 0;
}
.ec-pay-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 14px 32px 20px;
  border-top: 1px solid var(--line);
}

/* Stats */
.ec-stats {
  padding: 64px 0;
  background: var(--navy);
}
.ec-stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}
.ec-stat {
  padding: 32px 40px;
  border-right: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ec-stat:last-child { border-right: none; }
.ec-stat-num {
  font-family: var(--serif);
  font-size: clamp(36px, 4.5vw, 56px);
  color: #7BC043;
  font-style: italic;
  line-height: 1;
}
.ec-stat-label {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  line-height: 1.45;
  max-width: 200px;
}

/* Portfolio examples */
.ec-portfolio {
  padding: 80px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.ec-portfolio-hd { margin-bottom: 48px; }
.ec-portfolio-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.ec-portfolio-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}
.ec-pf-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  overflow: hidden;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.ec-pf-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.ec-pf-thumb { aspect-ratio: 4 / 3; overflow: hidden; }
.ec-pf-thumb img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform 0.4s ease;
}
.ec-pf-card:hover .ec-pf-thumb img { transform: scale(1.05); }
.ec-pf-body {
  padding: 18px 20px 22px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.ec-pf-title {
  font-family: var(--serif);
  font-size: 19px;
  color: var(--ink);
  font-weight: 400;
  margin: 0 0 4px;
}
.ec-pf-loc {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.ec-pf-link {
  font-size: 13px;
  font-weight: 500;
  color: var(--brand-blue);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: auto;
}
.ec-pf-card:hover .ec-pf-link { text-decoration: underline; }

@media (max-width: 720px) { .ec-portfolio-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .ec-portfolio-grid { grid-template-columns: 1fr; } }

/* CTA */
.ec-cta {
  padding: 80px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.ec-cta-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
}
.ec-cta-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 38px);
  color: var(--ink);
  font-weight: 400;
  margin: 0 0 8px;
  font-style: italic;
}
.ec-cta-sub { font-size: 15px; color: var(--ink-2); margin: 0; }

/* Service area note + related links */
.ec-area-note { font-size: 13px; color: var(--muted); margin: 8px 0 0; }
.ec-area-note a { color: var(--brand-green); }
.ec-related { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line); }
.ec-related-label { font-size: 11px; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.ec-related-link { font-size: 13px; color: var(--ink-2); text-decoration: none; }
.ec-related-link:hover { color: var(--ink); }

/* Responsive */
@media (max-width: 960px) {
  .ec-platforms-grid { grid-template-columns: 1fr; }
  .ec-pay-grid { grid-template-columns: 1fr; }
  .ec-features-grid { grid-template-columns: repeat(2, 1fr); }
  .ec-stats-row { grid-template-columns: 1fr; }
  .ec-stat { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .ec-stat:last-child { border-bottom: none; }
  .ec-cta-inner { flex-direction: column; align-items: flex-start; }
}
@media (max-width: 560px) {
  .ec-features-grid { grid-template-columns: 1fr; }
  .ec-hero-actions { flex-direction: column; align-items: flex-start; }
}
</style>
