<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SEO & Local Search — COLEwebdev · Cape Cod Web Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  "@context": "https://schema.org",

  "name": "SEO & Local Search",
  "url": "https://colewebdev.org/seo.html",
  "description": "Local SEO, Google Ads, and search strategy for Cape Cod small businesses. Ethical, transparent, focused on measurable results — no smoke and mirrors.",
  "provider": { "@type": "ProfessionalService", "name": "COLEwebdev", "url": "https://colewebdev.org/" },
  "areaServed": { "@type": "State", "name": "Cape Cod, Massachusetts" },
  "serviceType": "SEO Services"
}

<style>
/* ── SEO & Local Search page ── */

/* Hero — CSS gradient, brand navy */
.seo-hero {
  position: relative;
  overflow: hidden;
  min-height: 52vh;
  display: flex;
  align-items: center;
}
.seo-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 110% -10%, rgba(33,146,188,0.35), transparent 60%),
    radial-gradient(ellipse 60% 80% at -10% 110%, rgba(92,192,53,0.15), transparent 60%),
    linear-gradient(160deg, #0E2A4A 0%, #14385C 45%, #1B4A77 100%);
}
.seo-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    -45deg,
    transparent, transparent 48px,
    rgba(255,255,255,0.018) 48px, rgba(255,255,255,0.018) 49px
  );
}
.seo-hero-content {
  position: relative;
  z-index: 1;
  padding: 100px 0 96px;
  width: 100%;
}
.seo-eyebrow {
  color: var(--brand-green) !important;
}
.seo-eyebrow::before {
  background: var(--brand-green) !important;
}
.seo-hero-hl {
  font-family: var(--serif);
  font-size: clamp(36px, 5.5vw, 76px);
  line-height: 1.08;
  margin: 18px 0 22px;
  font-weight: 400;
  color: white;
  max-width: 16ch;
}
.seo-hero-hl em { font-style: italic; color: var(--brand-green); }
.seo-hero-sub {
  font-size: clamp(15px, 1.6vw, 18px);
  color: rgba(255,255,255,0.72);
  max-width: 50ch;
  line-height: 1.7;
  margin: 0 0 36px;
}
.seo-hero-actions {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.seo-ghost {
  color: rgba(255,255,255,0.7) !important;
  border-color: rgba(255,255,255,0.22) !important;
}

/* Why section */
.seo-why {
  padding: var(--pad-section) 0;
  background: var(--paper);
}
.seo-why-grid {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 80px;
  align-items: start;
}
.seo-why-stats {
  display: flex;
  flex-direction: column;
  gap: 32px;
  position: sticky;
  top: 32px;
}
.seo-stat {
  border-left: 3px solid var(--brand-green);
  padding-left: 20px;
}
.seo-stat-num {
  display: block;
  font-family: var(--serif);
  font-size: clamp(36px, 4vw, 52px);
  line-height: 1;
  color: var(--ink);
  font-weight: 400;
  margin-bottom: 6px;
}
.seo-stat-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--muted);
  line-height: 1.5;
  display: block;
}
.seo-why-body {
  display: flex;
  flex-direction: column;
}
.seo-why-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  line-height: 1.18;
  margin: 12px 0 24px;
  color: var(--ink);
  font-weight: 400;
}
.seo-why-hl em { font-style: italic; color: var(--brand-blue); }
.seo-body {
  font-size: clamp(15px, 1.4vw, 16px);
  line-height: 1.78;
  color: var(--ink-2);
  max-width: 52ch;
  margin: 0 0 18px;
}

/* Services grid */
.seo-services {
  padding: var(--pad-section) 0;
  background: white;
}
.seo-services-hd {
  margin-bottom: 48px;
}
.seo-services-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 12px 0 10px;
}
.seo-services-sub {
  font-size: 16px;
  color: var(--muted);
  max-width: 52ch;
  line-height: 1.6;
  margin: 0;
}
.seo-services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}
.seo-svc-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.seo-svc-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
}
.seo-svc-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: rgba(33,146,188,0.12);
  color: var(--brand-blue);
  display: grid;
  place-items: center;
  font-size: 18px;
  flex-shrink: 0;
}
.seo-svc-name {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--ink);
  font-weight: 400;
  margin: 0;
}
.seo-svc-body {
  font-size: 14px;
  line-height: 1.7;
  color: var(--muted);
  margin: 0;
}

/* How we work */
.seo-how {
  padding: var(--pad-section) 0;
  background: var(--navy);
  position: relative;
  overflow: hidden;
}
.seo-how::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    -45deg,
    transparent, transparent 40px,
    rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px
  );
}
.seo-how-hd {
  margin-bottom: 52px;
  position: relative;
  z-index: 1;
}
.seo-how .eyebrow { color: var(--brand-green); }
.seo-how .eyebrow::before { background: var(--brand-green); }
.seo-how-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: white;
  font-weight: 400;
  margin: 12px 0 0;
}
.seo-how-steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
  position: relative;
  z-index: 1;
}
.seo-how-step {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--r-lg);
  padding: 32px 26px 28px;
  backdrop-filter: blur(4px);
}
.seo-how-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--brand-green);
  margin-bottom: 8px;
}
.seo-how-label {
  font-family: var(--serif);
  font-size: 22px;
  color: white;
  font-weight: 400;
  margin-bottom: 12px;
}
.seo-how-body {
  font-size: 13.5px;
  line-height: 1.65;
  color: rgba(255,255,255,0.68);
  margin: 0;
}

/* Commitments */
.seo-commit {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.seo-commit-hd {
  margin-bottom: 44px;
}
.seo-commit-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 12px 0 0;
}
.seo-commit-hl em { font-style: italic; color: var(--brand-blue); }
.seo-commit-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}
.seo-commit-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 28px;
  display: flex;
  align-items: flex-start;
  gap: 18px;
  box-shadow: var(--shadow-sm);
}
.seo-commit-check {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(92,192,53,0.15);
  color: var(--brand-green-deep);
  display: grid;
  place-items: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}
.seo-commit-label {
  font-family: var(--serif);
  font-size: 19px;
  color: var(--ink);
  font-weight: 400;
  margin-bottom: 6px;
}
.seo-commit-desc {
  font-size: 14px;
  line-height: 1.65;
  color: var(--muted);
  margin: 0;
}

/* Testimonial */
.seo-testi {
  padding: var(--pad-section) 0;
  background: var(--paper);
}
.seo-testi-inner {
  max-width: 760px;
  margin: 0 auto;
  text-align: center;
}
.seo-quote-mark {
  font-family: var(--serif);
  font-size: 96px;
  line-height: 0.5;
  color: var(--brand-blue);
  opacity: 0.22;
  display: block;
  margin-bottom: 16px;
}
.seo-quote {
  font-family: var(--serif);
  font-size: clamp(19px, 2.2vw, 25px);
  line-height: 1.6;
  color: var(--ink);
  font-style: italic;
  margin: 0 0 32px;
  border: none;
  padding: 0;
}
.seo-testi-meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.seo-testi-img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: var(--shadow-md);
}
.seo-testi-name {
  font-weight: 600;
  font-size: 14px;
  text-align: left;
}
.seo-testi-role {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 3px;
  text-align: left;
}

/* CTA */
.seo-cta-section { padding: var(--pad-section) 0; background: white; }
.seo-cta {
  background: var(--ink);
  border-radius: var(--r-xl);
  padding: 64px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 40px;
  align-items: center;
}
.seo-cta-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: white;
  margin: 0 0 12px;
  font-weight: 400;
}
.seo-cta-hl em { font-style: italic; color: var(--brand-green); }
.seo-cta-sub {
  color: rgba(255,255,255,0.65);
  font-size: 15px;
  line-height: 1.65;
  max-width: 48ch;
  margin: 0;
}
.seo-cta-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

/* Responsive */
@media (max-width: 1024px) {
  .seo-why-grid { grid-template-columns: 240px 1fr; gap: 56px; }
  .seo-why-stats { position: static; }
}
@media (max-width: 960px) {
  .seo-why-grid { grid-template-columns: 1fr; gap: 48px; }
  .seo-why-stats { flex-direction: row; gap: 24px; flex-wrap: wrap; }
  .seo-stat { flex: 1 1 160px; }
  .seo-services-grid { grid-template-columns: repeat(2, 1fr); }
  .seo-how-steps { grid-template-columns: repeat(2, 1fr); }
  .seo-cta { grid-template-columns: 1fr; }
  .seo-cta-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
}
@media (max-width: 560px) {
  .seo-services-grid { grid-template-columns: 1fr; }
  .seo-how-steps { grid-template-columns: 1fr; }
  .seo-commit-grid { grid-template-columns: 1fr; }
  .seo-cta { padding: 36px 28px; }
  .seo-hero-actions { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
