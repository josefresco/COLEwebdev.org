<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Website Design + Build — COLEwebdev · Cape Cod Web Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  "@context": "https://schema.org",

  "name": "Website Design + Build",

  "description": "100% custom website design and development for Cape Cod small businesses and nonprofits. No templates, no shortcuts. Fixed price, end-to-end — design, build, mobile, CMS, and launch.",
  "provider": { "@type": "ProfessionalService", "name": "COLEwebdev", "url": "https://colewebdev.org/" },
  "areaServed": { "@type": "State", "name": "Cape Cod, Massachusetts" },

<style>
/* ── Website Design page ── */

/* Hero */
.wd-hero {
  display: flex;
  flex-direction: column;
}
.wd-hero-img {
  height: 48vh;
  min-height: 280px;
  background-image: url('https://www.colewebdev.com/wp-content/uploads/2020/05/website-design-wordpress-cape-cod-website-6.jpg');
  background-size: cover;
  background-position: center 40%;
  position: relative;
  flex-shrink: 0;
  transform: scale(1.03);
  transition: transform 8s ease;
}
.wd-hero-img.loaded { transform: scale(1); }
.wd-hero-img::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, var(--paper));
}
.wd-hero-text {
  background: var(--paper);
  padding: 52px 0 64px;
}
.wd-hero-hl {
  font-family: var(--serif);
  font-size: clamp(36px, 5vw, 68px);
  line-height: 1.1;
  margin: 16px 0 20px;
  font-weight: 400;
  color: var(--ink);
  max-width: 18ch;
}
.wd-hero-hl em { font-style: italic; color: var(--brand-blue); }
.wd-hero-sub {
  font-size: clamp(15px, 1.6vw, 17px);
  color: var(--muted);
  max-width: 54ch;
  line-height: 1.7;
  margin: 0;
}

/* Content sections */
.wd-section {
  padding: var(--pad-section) 0;
  background: var(--paper);
}
.wd-section--alt {
  background: white;
}

.wd-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 72px;
  align-items: start;
}
.wd-split--rev {
  direction: rtl;
}
.wd-split--rev > * { direction: ltr; }

.wd-split-text {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.wd-section-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  line-height: 1.18;
  margin: 12px 0 24px;
  color: var(--ink);
  font-weight: 400;
}
.wd-section-hl em { font-style: italic; color: var(--brand-blue); }
.wd-body {
  font-size: clamp(15px, 1.4vw, 16px);
  line-height: 1.78;
  color: var(--ink-2);
  max-width: 52ch;
  margin: 0 0 18px;
}
.wd-body strong { color: var(--ink); font-weight: 600; }

.wd-split-media {
  position: relative;
}
.wd-split-img {
  width: 100%;
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-lg);
  display: block;
  object-fit: cover;
}

/* Development bullet points */
.wd-points {
  list-style: none;
  margin: 8px 0 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.wd-point {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 16px;
  align-items: baseline;
}
.wd-point-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--brand-blue);
  font-weight: 600;
  padding-top: 2px;
}
.wd-point-body {
  font-size: 14.5px;
  line-height: 1.7;
  color: var(--ink-2);
}

/* Testimonial */
.wd-testi {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.wd-testi-inner {
  max-width: 780px;
  margin: 0 auto;
  text-align: center;
}
.wd-testi-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--brand-blue);
  margin-bottom: 28px;
  display: block;
}
.wd-quote {
  font-family: var(--serif);
  font-size: clamp(18px, 2.2vw, 24px);
  line-height: 1.6;
  color: var(--ink);
  font-style: italic;
  margin: 0 0 32px;
  border: none;
  padding: 0;
}
.wd-testi-meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 24px;
}
.wd-testi-img {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: var(--shadow-md);
}
.wd-testi-name {
  font-weight: 600;
  font-size: 14px;
  text-align: left;
}
.wd-testi-role {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 3px;
  text-align: left;
}
.wd-testi-note {
  font-size: 13px;
  color: var(--muted);
  margin: 0;
}
.wd-testi-note a {
  color: var(--brand-blue);
  text-decoration: underline;
}

/* Recent posts */
.wd-posts {
  padding: var(--pad-section) 0;
  background: var(--paper);
}
.wd-posts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--gap-card);
}
.wd-post-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
}
.wd-post-type {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--brand-green-deep);
  padding: 18px 24px 0;
}
.wd-post-img {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  display: block;
  margin-top: 14px;
}
.wd-post-body {
  padding: 22px 24px 28px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.wd-post-meta {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 10px;
}
.wd-post-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.wd-post-cat {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--brand-blue);
  background: rgba(33,146,188,0.10);
  padding: 2px 8px;
  border-radius: 999px;
}
.wd-post-title {
  font-family: var(--serif);
  font-size: clamp(18px, 2vw, 22px);
  line-height: 1.3;
  color: var(--ink);
  font-weight: 400;
  margin: 0 0 12px;
}
.wd-post-title a {
  color: inherit;
  text-decoration: none;
}
.wd-post-title a:hover { color: var(--brand-blue); }
.wd-post-excerpt {
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-2);
  margin: 0 0 20px;
  flex: 1;
}
.wd-post-link { align-self: flex-start; }

/* CTA */
.wd-cta-section { padding: var(--pad-section) 0; }
.wd-cta {
  background: var(--ink);
  border-radius: var(--r-xl);
  padding: 64px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 40px;
  align-items: center;
}
.wd-cta-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: white;
  margin: 0 0 12px;
  font-weight: 400;
}
.wd-cta-hl em { font-style: italic; color: var(--brand-green); }
.wd-cta-sub {
  color: rgba(255,255,255,0.65);
  font-size: 15px;
  line-height: 1.65;
  max-width: 48ch;
  margin: 0;
}
.wd-cta-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

/* Approach cards */
.wd-approaches {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.wd-approaches-hd { margin-bottom: 40px; }
.wd-approaches-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: var(--ink);
  font-weight: 400;
  margin: 10px 0 0;
}
.wd-approaches-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.wd-approach-card {
  border-radius: var(--r-xl);
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.wd-approach-card--wp {
  background: #0E2A4A;
  border: 1px solid rgba(0,115,170,0.3);
}
.wd-approach-card--tr {
  background: #1E2330;
  border: 1px solid rgba(108,142,191,0.25);
}
.wd-approach-top {
  display: flex;
  align-items: center;
  gap: 10px;
}
.wd-approach-icon {
  font-size: 20px;
  color: rgba(255,255,255,0.5);
}
.wd-approach-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}
.wd-approach-hl {
  font-family: var(--serif);
  font-size: clamp(22px, 2.4vw, 28px);
  color: white;
  font-weight: 400;
  margin: 0;
  line-height: 1.2;
}
.wd-approach-card--wp .wd-approach-hl em { color: #3EB0EF; font-style: italic; }
.wd-approach-card--tr .wd-approach-hl em { color: #7BC043; font-style: italic; }
.wd-approach-body {
  font-size: 14px;
  line-height: 1.7;
  color: rgba(255,255,255,0.65);
  margin: 0;
}
.wd-approach-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}
.wd-approach-list li {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  padding-left: 16px;
  position: relative;
}
.wd-approach-list li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: rgba(255,255,255,0.25);
}
.wd-approach-btn { align-self: flex-start; margin-top: 4px; }
.wd-approach-btn--tr {
  color: rgba(255,255,255,0.75);
  border-color: rgba(255,255,255,0.25);
}
.wd-approach-btn--tr:hover {
  color: white;
  border-color: rgba(255,255,255,0.6);
}

/* Responsive */
@media (max-width: 960px) {
  .wd-split {
    grid-template-columns: 1fr;
    gap: 40px;
    direction: ltr !important;
  }
  .wd-split--rev > * { direction: ltr; }
  .wd-posts-grid { grid-template-columns: 1fr; }
  .wd-approaches-grid { grid-template-columns: 1fr; }
  .wd-cta { grid-template-columns: 1fr; }
  .wd-cta-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
}
@media (max-width: 560px) {
  .wd-hero-img { height: 36vh; }
  .wd-cta { padding: 36px 28px; }
  .wd-point { grid-template-columns: 1fr; gap: 4px; }
}
</style>
</head>

<script type="text/babel" src="parts-rest.jsx"></script>
<script type="text/babel" src="website-design-page.jsx"></script>
</body>
</html>
