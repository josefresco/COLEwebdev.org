<style>
/* ── Cape Cod Marketing page ── */

/* Hero */
.mkt-hero {
  position: relative;
  overflow: hidden;
  min-height: 56vh;
  display: flex;
  align-items: center;
}
.mkt-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 70% at 110% 0%, rgba(242,107,31,0.28), transparent 50%),
    radial-gradient(ellipse 50% 60% at -10% 100%, rgba(123,192,67,0.18), transparent 55%),
    linear-gradient(150deg, #0A1F36 0%, #0E2A4A 55%, #122E52 100%);
}
.mkt-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.022) 39px, rgba(255,255,255,0.022) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.022) 39px, rgba(255,255,255,0.022) 40px);
}
.mkt-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 100px 0 88px;
}
.mkt-eyebrow { color: rgba(255,255,255,0.55); }
.mkt-hero-hl {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 76px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1px;
}
.mkt-hero-hl em { color: #F26B1F; font-style: italic; }
.mkt-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.7);
  max-width: 580px;
  margin: 0 0 36px;
}
.mkt-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.mkt-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
.mkt-ghost:hover { border-color: rgba(255,255,255,0.7); color: white; }
.mkt-hero-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 40px; }
.mkt-hero-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 5px 12px;
  border-radius: 999px;
}

/* Services */
.mkt-services {
  padding: 88px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.mkt-services-hd { margin-bottom: 52px; max-width: 680px; }
.mkt-services-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 16px;
}
.mkt-services-sub {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-2);
  margin: 0;
}
.mkt-services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.mkt-service-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s, box-shadow 0.22s;
}
.mkt-service-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.mkt-service-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 18px;
  flex-shrink: 0;
}
.mkt-service-title {
  font-family: var(--serif);
  font-size: 21px;
  color: var(--ink);
  font-weight: 400;
}
.mkt-service-desc {
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--ink-2);
}

/* Why us */
.mkt-why {
  padding: 88px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.mkt-why-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 72px;
  align-items: start;
}
.mkt-why-eyebrow { color: var(--muted); }
.mkt-why-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 24px;
  line-height: 1.15;
}
.mkt-why-body {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-2);
  margin: 0 0 18px;
}
.mkt-why-right {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.mkt-reason {
  display: flex;
  gap: 20px;
  padding: 22px 24px;
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  align-items: flex-start;
}
.mkt-reason-n {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--brand-green);
  flex-shrink: 0;
  padding-top: 3px;
}
.mkt-reason-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 5px;
}
.mkt-reason-body {
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink-2);
}

/* Stats band */
.mkt-stats {
  background: var(--navy);
  padding: 56px 0;
}
.mkt-stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}
.mkt-stat {
  padding: 24px 40px;
  border-right: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.mkt-stat:last-child { border-right: none; }
.mkt-stat-num {
  font-family: var(--serif);
  font-size: clamp(36px, 4.5vw, 56px);
  color: #F26B1F;
  font-style: italic;
  line-height: 1;
}
.mkt-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  line-height: 1.45;
  max-width: 200px;
}

/* CTA */
.mkt-cta {
  padding: 80px 0;
  background: var(--navy);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.mkt-cta-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r-xl);
  padding: 52px 60px;
}
.mkt-cta-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 38px);
  color: white;
  font-weight: 400;
  font-style: italic;
  margin: 0 0 10px;
}
.mkt-cta-sub {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  margin: 0;
  max-width: 420px;
}
.mkt-cta-actions { display: flex; gap: 14px; flex-wrap: wrap; flex-shrink: 0; }

/* Responsive */
@media (max-width: 960px) {
  .mkt-services-grid { grid-template-columns: repeat(2, 1fr); }
  .mkt-why-grid { grid-template-columns: 1fr; gap: 48px; }
  .mkt-stats-grid { grid-template-columns: 1fr; }
  .mkt-stat { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .mkt-stat:last-child { border-bottom: none; }
  .mkt-cta-inner { padding: 40px 32px; flex-direction: column; align-items: flex-start; }
}
@media (max-width: 600px) {
  .mkt-services-grid { grid-template-columns: 1fr; }
  .mkt-hero-actions { flex-direction: column; align-items: flex-start; }
}
</style>
