<style>
/* ── Cape Cod AI hub page ── */

/* Hero */
.cai-hero {
  position: relative;
  overflow: hidden;
  min-height: 52vh;
  display: flex;
  align-items: center;
}
.cai-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 80% at 100% 0%, rgba(123,192,67,0.22), transparent 55%),
    radial-gradient(ellipse 50% 60% at 0% 100%, rgba(242,107,31,0.12), transparent 55%),
    linear-gradient(150deg, #0A1F36 0%, #0E2A4A 50%, #122E52 100%);
}
.cai-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.018) 39px, rgba(255,255,255,0.018) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.018) 39px, rgba(255,255,255,0.018) 40px);
}
.cai-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 96px 0 76px;
}
.cai-eyebrow { color: rgba(255,255,255,0.6); }
.cai-hero-hl {
  font-family: var(--serif);
  font-size: clamp(38px, 5.6vw, 68px);
  line-height: 1.08;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1px;
}
.cai-hero-hl em { color: #7BC043; font-style: italic; }
.cai-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.72);
  max-width: 600px;
  margin: 0 0 36px;
}
.cai-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.cai-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
.cai-ghost:hover { border-color: rgba(255,255,255,0.7); color: white; }
.cai-hero-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 40px; }
.cai-hero-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 5px 12px;
  border-radius: 999px;
}

/* Why local */
.cai-why {
  padding: 88px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.cai-why-grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 64px;
  align-items: start;
}
.cai-why-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 24px;
  line-height: 1.15;
}
.cai-why-p {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-2);
  margin: 0 0 18px;
}
.cai-why-pull {
  background: var(--navy);
  border-radius: var(--r-xl);
  padding: 36px 40px;
}
.cai-why-quote {
  font-family: var(--serif);
  font-size: clamp(19px, 2.3vw, 25px);
  color: #7BC043;
  font-style: italic;
  line-height: 1.45;
  margin-bottom: 18px;
}
.cai-why-attr {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}

/* Hub cards */
.cai-hub {
  padding: 80px 0;
  background: var(--navy);
  border-top: 1px solid rgba(255,255,255,0.06);
}
.cai-hub-hd { margin-bottom: 48px; }
.cai-hub-eyebrow { color: rgba(255,255,255,0.5); }
.cai-hub-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: white;
  font-weight: 400;
  margin: 8px 0 0;
}
.cai-hub-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.cai-hub-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: var(--shadow-sm);
  text-decoration: none;
  transition: transform 0.22s, box-shadow 0.22s;
}
.cai-hub-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.cai-hub-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 18px;
  flex-shrink: 0;
}
.cai-hub-title { font-family: var(--serif); font-size: 20px; color: var(--ink); font-weight: 400; }
.cai-hub-body { font-size: 13.5px; line-height: 1.65; color: var(--ink-2); flex: 1; }
.cai-hub-link { font-size: 13px; font-weight: 600; color: var(--brand-blue); }

/* FAQ */
.cai-faq {
  padding: 88px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.cai-faq-inner { max-width: 760px; }
.cai-faq-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 32px;
  line-height: 1.15;
}
.cai-faq-list { display: flex; flex-direction: column; gap: 10px; }
.cai-faq-item {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 18px 22px;
}
.cai-faq-q {
  font-size: 15.5px;
  font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  list-style: none;
}
.cai-faq-q::-webkit-details-marker { display: none; }
.cai-faq-a {
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink-2);
  margin: 12px 0 0;
}

/* CTA */
.cai-cta { padding: 80px 0; background: var(--navy); }
.cai-cta-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--r-xl);
  padding: 56px 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
}
.cai-cta-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 38px);
  color: white;
  font-weight: 400;
  margin: 0 0 10px;
  font-style: italic;
}
.cai-cta-sub { font-size: 15px; color: rgba(255,255,255,0.65); margin: 0; max-width: 440px; }
.cai-cta-actions { display: flex; gap: 14px; flex-wrap: wrap; flex-shrink: 0; }
.cai-area-note { font-size: 13px; color: rgba(255,255,255,0.45); margin: 14px 0 0; }
.cai-area-note a { color: var(--brand-green); }

/* Responsive */
@media (max-width: 960px) {
  .cai-why-grid { grid-template-columns: 1fr; gap: 40px; }
  .cai-hub-grid { grid-template-columns: repeat(2, 1fr); }
  .cai-cta-card { padding: 40px 32px; flex-direction: column; align-items: flex-start; }
}
@media (max-width: 640px) {
  .cai-hub-grid { grid-template-columns: 1fr; }
  .cai-hero-actions { flex-direction: column; align-items: flex-start; }
}
</style>
