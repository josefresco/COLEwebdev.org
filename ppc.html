<style>
/* ── PPC & Google Ads page ── */

.ppc-hero {
  position: relative;
  overflow: hidden;
  min-height: 52vh;
  display: flex;
  align-items: center;
}
.ppc-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 110% -5%, rgba(242,107,31,0.42), transparent 55%),
    radial-gradient(ellipse 50% 70% at -8% 110%, rgba(14,90,160,0.20), transparent 55%),
    linear-gradient(155deg, #0A1F38 0%, #0E2748 55%, #112950 100%);
}
.ppc-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(60deg, transparent, transparent 58px, rgba(255,255,255,0.015) 58px, rgba(255,255,255,0.015) 59px);
}
.ppc-hero-content {
  position: relative;
  z-index: 1;
  padding: 100px 0 88px;
  width: 100%;
}
.ppc-eyebrow { color: rgba(255,255,255,0.6); }
.ppc-hero-hl {
  font-family: var(--serif);
  font-size: clamp(38px, 5.5vw, 74px);
  line-height: 1.07;
  margin: 16px 0 22px;
  font-weight: 400;
  color: white;
  max-width: 18ch;
  letter-spacing: -0.5px;
}
.ppc-hero-hl em { font-style: italic; color: #F26B1F; }
.ppc-hero-sub {
  font-size: clamp(15px, 1.6vw, 17px);
  color: rgba(255,255,255,0.72);
  max-width: 52ch;
  line-height: 1.72;
  margin: 0 0 36px;
}
.ppc-hero-actions {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.ppc-ghost {
  color: rgba(255,255,255,0.7) !important;
  border-color: rgba(255,255,255,0.22) !important;
}
.ppc-tags { display: flex; gap: 10px; margin-top: 32px; flex-wrap: wrap; }
.ppc-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 13px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.65);
}

/* The problem section */
.ppc-problem {
  padding: 80px 0;
  background: var(--paper);
}
.ppc-problem-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}
.ppc-problem-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 20px;
  line-height: 1.2;
}
.ppc-problem-hl em { font-style: italic; color: #D05A12; }
.ppc-problem-body { font-size: 15px; line-height: 1.75; color: var(--ink-2); margin: 0 0 16px; }
.ppc-stats {
  display: flex;
  flex-direction: column;
  gap: 0;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  overflow: hidden;
  background: white;
  box-shadow: var(--shadow-sm);
}
.ppc-stat {
  padding: 28px 32px;
  border-bottom: 1px solid var(--line);
}
.ppc-stat:last-child { border-bottom: none; }
.ppc-stat-num {
  font-family: var(--serif);
  font-size: clamp(34px, 4vw, 52px);
  color: #D05A12;
  font-style: italic;
  line-height: 1;
  margin-bottom: 6px;
}
.ppc-stat-label { font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }

/* Service offerings */
.ppc-offerings {
  padding: 80px 0;
  background: white;
  border-top: 1px solid var(--line);
}
.ppc-offerings-hd { margin-bottom: 48px; }
.ppc-offerings-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 12px 0 10px;
}
.ppc-offerings-sub {
  font-size: 16px;
  color: var(--muted);
  max-width: 52ch;
  line-height: 1.6;
  margin: 0;
}
.ppc-offerings-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
.ppc-offering-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 32px 30px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.ppc-offering-card--full { grid-column: 1 / -1; }
.ppc-offering-card--featured {
  border-left: 3px solid #D05A12;
  background: rgba(242,107,31,0.03);
}
.ppc-offering-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.ppc-offering-type {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--paper-2);
  border: 1px solid var(--line);
  padding: 3px 10px;
  border-radius: 999px;
}
.ppc-offering-type--featured {
  color: #D05A12;
  background: rgba(242,107,31,0.08);
  border-color: rgba(242,107,31,0.3);
}
.ppc-offering-rec {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: white;
  background: #D05A12;
  padding: 3px 10px;
  border-radius: 999px;
}
.ppc-offering-name {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--ink);
  font-weight: 400;
}
.ppc-offering-desc {
  font-size: 14px;
  line-height: 1.72;
  color: var(--ink-2);
}
.ppc-offering-list {
  list-style: none;
  padding: 0;
  margin: 6px 0 0;
  display: flex;
  flex-direction: column;
  gap: 7px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}
.ppc-offering-list li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.5;
}
.ppc-offering-list li::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #D05A12;
  flex-shrink: 0;
  margin-top: 6px;
}

/* Three Pillars */
.ppc-pillars {
  padding: 80px 0;
  background: var(--navy);
  position: relative;
  overflow: hidden;
}
.ppc-pillars::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(60deg, transparent, transparent 58px, rgba(255,255,255,0.015) 58px, rgba(255,255,255,0.015) 59px);
}
.ppc-pillars-hd {
  margin-bottom: 52px;
  position: relative;
  z-index: 1;
}
.ppc-pillars .eyebrow { color: #F26B1F; }
.ppc-pillars .eyebrow::before { background: #F26B1F; }
.ppc-pillars-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: white;
  font-weight: 400;
  margin: 12px 0 0;
}
.ppc-pillars-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  position: relative;
  z-index: 1;
}
.ppc-pillar {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--r-xl);
  padding: 36px 30px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  backdrop-filter: blur(4px);
}
.ppc-pillar-num {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #F26B1F;
}
.ppc-pillar-title {
  font-family: var(--serif);
  font-size: 22px;
  color: white;
  font-weight: 400;
  line-height: 1.25;
}
.ppc-pillar-body {
  font-size: 14px;
  line-height: 1.68;
  color: rgba(255,255,255,0.72);
}
.ppc-pillar-detail {
  font-size: 13px;
  line-height: 1.6;
  color: rgba(255,255,255,0.50);
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.ppc-pillars-guide {
  margin-top: 40px;
  text-align: center;
  position: relative;
  z-index: 1;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.ppc-guide-note {
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  margin: 0 0 18px;
  line-height: 1.6;
}
.ppc-guide-note strong { color: rgba(255,255,255,0.9); }

/* How we work */
.ppc-how {
  padding: 80px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.ppc-how-hd { margin-bottom: 48px; }
.ppc-how-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 12px 0 0;
}
.ppc-how-steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}
.ppc-step {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ppc-step-num {
  font-family: var(--serif);
  font-size: 44px;
  line-height: 1;
  font-style: italic;
  color: var(--line-2);
}
.ppc-step-label {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--ink);
  font-weight: 400;
}
.ppc-step-body { font-size: 13px; line-height: 1.65; color: var(--muted); }

/* Commitments */
.ppc-commit {
  padding: 80px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.ppc-commit-hd { margin-bottom: 48px; }
.ppc-commit-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 12px 0 0;
}
.ppc-commit-hl em { font-style: italic; color: #D05A12; }
.ppc-commit-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 22px;
}
.ppc-commit-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px;
  display: flex;
  align-items: flex-start;
  gap: 18px;
  box-shadow: var(--shadow-sm);
}
.ppc-commit-check {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(242,107,31,0.12);
  color: #D05A12;
  display: grid;
  place-items: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}
.ppc-commit-label {
  font-family: var(--serif);
  font-size: 19px;
  color: var(--ink);
  font-weight: 400;
  margin-bottom: 6px;
}
.ppc-commit-desc { font-size: 14px; line-height: 1.65; color: var(--muted); margin: 0; }

/* CTA */
.ppc-cta-section { padding: 80px 0; background: white; border-top: 1px solid var(--line); }
.ppc-cta {
  background: var(--ink);
  border-radius: var(--r-xl);
  padding: 64px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 40px;
  align-items: center;
}
.ppc-cta-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 38px);
  color: white;
  margin: 0 0 12px;
  font-weight: 400;
}
.ppc-cta-hl em { font-style: italic; color: #F26B1F; }
.ppc-cta-sub {
  color: rgba(255,255,255,0.65);
  font-size: 15px;
  line-height: 1.65;
  max-width: 48ch;
  margin: 0;
}
.ppc-cta-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}
.ppc-area-note { font-size: 13px; color: rgba(255,255,255,0.45); margin: 8px 0 0; }
.ppc-area-note a { color: #F26B1F; }
.ppc-related { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
.ppc-related-label { font-size: 11px; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
.ppc-related-link { font-size: 13px; color: rgba(255,255,255,0.7); text-decoration: none; }
.ppc-related-link:hover { color: white; }

/* Responsive */
@media (max-width: 960px) {
  .ppc-problem-grid { grid-template-columns: 1fr; gap: 48px; }
  .ppc-offerings-grid { grid-template-columns: 1fr; }
  .ppc-offering-card--full { grid-column: 1; }
  .ppc-pillars-grid { grid-template-columns: 1fr; }
  .ppc-how-steps { grid-template-columns: repeat(2, 1fr); }
  .ppc-cta { grid-template-columns: 1fr; }
  .ppc-cta-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
}
@media (max-width: 560px) {
  .ppc-how-steps { grid-template-columns: 1fr; }
  .ppc-commit-grid { grid-template-columns: 1fr; }
  .ppc-cta { padding: 36px 28px; }
  .ppc-hero-actions { flex-direction: column; align-items: flex-start; }
}
</style>
