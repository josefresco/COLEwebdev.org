<style>
/* ── News page ── */

/* Intro */
.ns-intro {
  padding: 72px 0 0;
  background: var(--paper);
}
.ns-intro-hl {
  font-family: var(--serif);
  font-size: clamp(48px, 7vw, 96px);
  line-height: 1;
  margin: 14px 0 0;
  color: var(--ink);
  font-weight: 400;
  font-style: italic;
  letter-spacing: -2px;
}

/* Main */
.ns-main {
  padding: 56px 0 var(--pad-section);
  background: var(--paper);
}

/* Filters */
.ns-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 40px;
}
.ns-filter-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 7px 18px;
  border-radius: 999px;
  border: 1.5px solid var(--line-2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.ns-filter-btn:hover {
  border-color: var(--brand-green);
  color: var(--brand-green);
}
.ns-filter-btn.is-active {
  background: var(--brand-green);
  border-color: var(--brand-green);
  color: white;
}

/* Grid */
.ns-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
}

/* Card */
.ns-card {
  background: white;
  border-radius: var(--r-xl);
  border: 1px solid var(--line);
  overflow: hidden;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.ns-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-md);
}

/* Image */
.ns-card-img {
  aspect-ratio: 16 / 9;
  overflow: hidden;
  background: var(--paper-2);
  flex-shrink: 0;
}
.ns-card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}
.ns-card:hover .ns-card-img img { transform: scale(1.05); }
.ns-card-img-ph {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--paper-2) 0%, var(--line) 100%);
}

/* Body */
.ns-card-body {
  padding: 24px 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}
.ns-card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.ns-cat {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: white;
  background: var(--brand-green);
  padding: 3px 10px;
  border-radius: 999px;
  flex-shrink: 0;
}
.ns-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.05em;
}
.ns-card-title {
  font-family: var(--serif);
  font-size: 20px;
  line-height: 1.25;
  color: var(--ink);
  font-weight: 400;
  margin: 0;
}
.ns-card-excerpt {
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--ink-2);
  margin: 0;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.ns-read-more {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--brand-blue);
  margin-top: 2px;
}
.ns-card:hover .ns-read-more { text-decoration: underline; }

/* Loading / empty */
.ns-state {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 80px 0;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.ns-state-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--brand-green);
  animation: ns-pulse 1.2s ease-in-out infinite;
}
@keyframes ns-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

/* Load more */
.ns-load-more {
  display: flex;
  justify-content: center;
  margin-top: 52px;
}

/* Responsive */
@media (max-width: 960px) {
  .ns-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px) {
  .ns-grid { grid-template-columns: 1fr; }
  .ns-intro-hl { letter-spacing: -1px; }
}
</style>
</head>
