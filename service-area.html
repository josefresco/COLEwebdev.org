<style>
/* ── Service Area page ── */

.sa-hero {
  position: relative;
  overflow: hidden;
  min-height: 52vh;
  display: flex;
  align-items: center;
}
.sa-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 55% at 105% -10%, rgba(123,192,67,0.20), transparent 55%),
    radial-gradient(ellipse 50% 60% at -5% 110%, rgba(14,90,160,0.18), transparent 55%),
    linear-gradient(150deg, #060D1A 0%, #0A1E38 55%, #0C1A30 100%);
}
.sa-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.015) 59px, rgba(255,255,255,0.015) 60px),
    repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.015) 59px, rgba(255,255,255,0.015) 60px);
}
.sa-hero-content { position: relative; z-index: 1; width: 100%; padding: 100px 0 80px; }
.sa-eyebrow { color: rgba(255,255,255,0.6); }
.sa-hero-hl {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 72px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1px;
}
.sa-hero-hl em { color: #7BC043; font-style: italic; }
.sa-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.72);
  max-width: 560px;
  margin: 0 0 36px;
}
.sa-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.sa-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
.sa-ghost:hover { border-color: rgba(255,255,255,0.7); color: white; }

/* Towns grid */
.sa-towns { padding: 80px 0; background: var(--paper); }
.sa-towns-hd { margin-bottom: 16px; }
.sa-towns-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.sa-towns-sub { font-size: 15px; color: var(--ink-2); margin: 12px 0 40px; }
.sa-towns-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.sa-town-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.sa-town-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: var(--brand-green);
}
.sa-town-card--home { border-color: var(--brand-green); background: rgba(123,192,67,0.04); }
.sa-town-name {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--ink);
  font-weight: 400;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.sa-home-pill {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--brand-green);
  color: white;
  padding: 3px 8px;
  border-radius: 999px;
}
.sa-town-desc { font-size: 13px; line-height: 1.6; color: var(--ink-2); flex: 1; }
.sa-town-link { font-size: 12px; color: var(--brand-green); font-weight: 500; }

/* Beyond */
.sa-beyond {
  padding: 80px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.sa-beyond-hd { margin-bottom: 40px; }
.sa-beyond-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.sa-beyond-sub { font-size: 15px; color: var(--ink-2); margin: 12px 0 0; max-width: 540px; }
.sa-beyond-list {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 36px;
}
.sa-beyond-item {
  background: white;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sa-beyond-name { font-size: 15px; font-weight: 500; color: var(--ink); }
.sa-beyond-note { font-size: 12px; color: var(--muted); }

/* Why */
.sa-why {
  padding: 80px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.sa-why-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}
.sa-why-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 20px;
  line-height: 1.2;
}
.sa-why-body { font-size: 15px; line-height: 1.7; color: var(--ink-2); margin: 0 0 16px; }
.sa-why-body:last-of-type { margin-bottom: 28px; }
.sa-stats { display: flex; flex-direction: column; gap: 0; }
.sa-stat {
  padding: 28px 32px;
  border-bottom: 1px solid var(--line);
}
.sa-stat:last-child { border-bottom: none; }
.sa-stat-num {
  font-family: var(--serif);
  font-size: clamp(36px, 4vw, 52px);
  color: var(--brand-green);
  font-style: italic;
  line-height: 1;
  margin-bottom: 6px;
}
.sa-stat-label { font-size: 14px; color: var(--ink-2); line-height: 1.4; max-width: 220px; }

/* CTA */
.sa-cta { padding: 80px 0; background: var(--navy); border-top: 1px solid rgba(255,255,255,0.08); }
.sa-cta-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
}
.sa-cta-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 38px);
  color: white;
  font-weight: 400;
  margin: 0 0 8px;
  font-style: italic;
}
.sa-cta-sub { font-size: 15px; color: rgba(255,255,255,0.65); margin: 0; }

@media (max-width: 960px) {
  .sa-towns-grid { grid-template-columns: repeat(2, 1fr); }
  .sa-beyond-list { grid-template-columns: repeat(2, 1fr); }
  .sa-why-grid { grid-template-columns: 1fr; gap: 48px; }
  .sa-cta-inner { flex-direction: column; align-items: flex-start; }
}
@media (max-width: 560px) {
  .sa-towns-grid { grid-template-columns: 1fr; }
  .sa-beyond-list { grid-template-columns: 1fr; }
  .sa-hero-actions { flex-direction: column; align-items: flex-start; }
}
</style>
