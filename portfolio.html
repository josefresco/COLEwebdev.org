<head>

<style>
/* ── Portfolio page ── */

.pfhero {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--line);
}
.pfhero-img {
  height: 48vh;
  min-height: 280px;
  background-image: url('assets/portfolio-hero.jpg');
  background-size: cover;
  background-position: center 30%;
  position: relative;
  flex-shrink: 0;
  transform: scale(1.03);
  transition: transform 8s ease;
}
.pfhero-img.loaded { transform: scale(1); }
.pfhero-img::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, var(--paper));
}
.pfhero-text {
  background: var(--paper);
  padding: 52px 0 64px;
}
.pfhero-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 48px 80px;
  align-items: end;
}
.pfhero-num {
  font-family: var(--serif);
  font-size: clamp(96px, 14vw, 160px);
  line-height: 0.9;
  color: var(--navy);
  font-style: italic;
  letter-spacing: -4px;
  margin: 0;
}
.pfhero-num sup {
  font-family: var(--sans);
  font-size: 0.28em;
  letter-spacing: 0;
  vertical-align: super;
  color: var(--brand-green);
  font-style: normal;
  font-weight: 600;
}
.pfhero-sub {
  margin: 12px 0 0;
  font-size: clamp(15px, 1.8vw, 18px);
  color: var(--muted);
  max-width: 40ch;
  line-height: 1.6;
}
.pfhero-right {
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: flex-start;
  padding-bottom: 6px;
}
.pfhero-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 0;
}
.pf-filters {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
}
.pf-filter {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid var(--line-2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.pf-filter:hover { border-color: var(--navy); color: var(--navy); }
.pf-filter.active { background: var(--navy); border-color: var(--navy); color: white; }
.pf-filter .ct { opacity: 0.5; font-size: 9px; margin-left: 4px; }

/* Grid */
.pf-section { padding: 48px 0 var(--pad-section); }
.pf-meta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  gap: 16px;
}
.pf-count {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.pf-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--gap-card);
}

/* Card */
.pf-card {
  background: white;
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--line);
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.35s ease, transform 0.35s ease, box-shadow 0.2s ease;
}
.pf-card.in { opacity: 1; transform: translateY(0); }
.pf-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }

.pf-thumb {
  aspect-ratio: 4 / 3;
  overflow: hidden;
  position: relative;
}
.pf-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.45s ease;
}
.pf-card:hover .pf-thumb img { transform: scale(1.05); }

/* Gradient placeholder */
.pf-ph {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.pf-ph::after {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    -48deg,
    transparent, transparent 18px,
    rgba(255,255,255,0.05) 18px, rgba(255,255,255,0.05) 19px
  );
}
.pf-init {
  font-family: var(--serif);
  font-size: 58px;
  font-style: italic;
  color: rgba(255,255,255,0.85);
  letter-spacing: -2px;
  line-height: 1;
  position: relative;
  z-index: 1;
  user-select: none;
}
.ph-wp { background: linear-gradient(145deg, var(--navy) 0%, var(--brand-blue) 100%); }
.ph-ec { background: linear-gradient(145deg, #7C2D12 0%, var(--orange) 100%); }
.ph-ho { background: linear-gradient(145deg, #78350F 0%, #D97706 100%); }
.ph-np { background: linear-gradient(145deg, var(--brand-green-deep) 0%, #7BC043 100%); }
.ph-sv { background: linear-gradient(145deg, #0F2A44 0%, var(--navy-2) 100%); }

/* Card body */
.pf-body { padding: 18px 20px 22px; }
.pf-tags-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.pf-title {
  font-family: var(--serif);
  font-size: 18px;
  line-height: 1.3;
  margin: 0 0 5px;
  color: var(--ink);
}
.pf-loc {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.pf-cta {
  font-size: 13px;
  font-weight: 500;
  color: var(--brand-blue);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: gap 0.15s ease;
  text-decoration: none;
}
.pf-card:hover .pf-cta { gap: 9px; }
.pf-arrow { display: inline-block; transition: transform 0.15s ease; }
.pf-card:hover .pf-arrow { transform: translateX(3px); }

/* CTA strip */
.pf-more {
  margin-top: 56px;
  padding: 44px;
  background: var(--navy);
  border-radius: var(--r-xl);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.pf-more-text { font-family: var(--serif); font-size: clamp(20px, 2.5vw, 28px); color: white; line-height: 1.3; }
.pf-more-text em { color: var(--brand-green); }

@media (max-width: 960px) {
  .pfhero-grid { grid-template-columns: 1fr; gap: 28px; }
  .pfhero-right { align-items: flex-start; }
  .pf-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 580px) {
  .pf-grid { grid-template-columns: 1fr; }
  .pfhero-num { font-size: clamp(72px, 22vw, 96px); }
}
</style>
