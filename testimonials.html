/* ── Testimonials page ── */
.tm-hero {
  padding: 72px 0 56px;
  background: var(--paper);
}
.tm-hero-hl {
  font-family: var(--serif);
  font-size: clamp(44px, 6vw, 80px);
  line-height: 1;
  margin: 14px 0 16px;
  color: var(--ink);
  font-weight: 400;
  font-style: italic;
  letter-spacing: -2px;
}
.tm-hero-sub {
  font-size: 17px;
  color: var(--ink-2);
  line-height: 1.6;
  max-width: 52ch;
  margin: 0 0 36px;
}
.tm-hero-badges {
  display: flex;
  align-items: center;
  gap: 28px;
  flex-wrap: wrap;
}
.tm-badge {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.tm-badge-stars {
  font-size: 18px;
  color: #f5a623;
  letter-spacing: 1px;
  line-height: 1;
}
.tm-badge-score {
  font-family: var(--serif);
  font-size: 36px;
  color: var(--ink);
  font-style: italic;
  line-height: 1;
}
.tm-badge-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.tm-badge-num {
  font-family: var(--serif);
  font-size: 36px;
  color: var(--ink);
  font-style: italic;
  line-height: 1;
}
.tm-badge-label {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.tm-badge-divider {
  width: 1px;
  height: 48px;
  background: var(--line);
}

/* Grid */
.tm-grid-section {
  padding: 56px 0 var(--pad-section);
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.tm-grid {
  columns: 3;
  column-gap: 20px;
}
.tm-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px 22px;
  break-inside: avoid;
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.tm-stars {
  font-size: 14px;
  color: #f5a623;
  letter-spacing: 1px;
  line-height: 1;
}
.tm-quote {
  font-size: 14.5px;
  line-height: 1.7;
  color: var(--ink-2);
  margin: 0;
  quotes: none;
}
.tm-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--line);
}
.tm-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
}
.tm-biz {
  font-size: 12px;
  color: var(--muted);
}
.tm-cat {
  display: inline-block;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--brand-blue);
  background: rgba(0, 102, 255, 0.06);
  border: 1px solid rgba(0, 102, 255, 0.15);
  border-radius: 999px;
  padding: 3px 9px;
  align-self: flex-start;
}

/* Services strip */
.tm-services {
  padding: 32px 0;
  background: white;
  border-top: 1px solid var(--line);
}
.tm-services-label {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 0 0 14px;
}
.tm-services-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.tm-service-chip {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 14px;
  text-decoration: none;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.tm-service-chip:hover {
  background: var(--paper-2);
  border-color: var(--brand-blue);
  color: var(--brand-blue);
}

/* Google CTA */
.tm-google-cta {
  padding: 48px 0;
  background: white;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.tm-google-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  flex-wrap: wrap;
}
.tm-google-hl {

  font-size: clamp(20px, 2.5vw, 28px);
  color: var(--ink);
  font-weight: 400;
  font-style: italic;

}
.tm-google-sub {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  max-width: 48ch;
  margin: 0;
}

.tm-cta-section {
  padding: var(--pad-section) 0;
  background: var(--navy);
}
.tm-cta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
}
.tm-cta-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 4vw, 52px);
  color: white;
  font-weight: 400;
  font-style: italic;
  margin: 0 0 10px;
  letter-spacing: -1px;
}
.tm-cta-sub {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  line-height: 1.65;
  max-width: 44ch;
  margin: 0;
}
.tm-cta-actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

@media (max-width: 1100px) {
  .tm-grid { columns: 2; }
}
@media (max-width: 700px) {
  .tm-grid { columns: 1; }
  .tm-hero-hl { letter-spacing: -1px; }
  .tm-hero-badges { gap: 16px; }
  .tm-google-inner { flex-direction: column; align-items: flex-start; }
  .tm-cta { flex-direction: column; align-items: flex-start; }
}
