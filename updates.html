<style>
/* ── Updates & Maintenance page (um-) ── */

/* Hero */
.um-hero {
  position: relative;
  overflow: hidden;
  min-height: 52vh;
  display: flex;
  align-items: center;
}
.um-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 65% at 110% 0%, rgba(14,42,74,0.55), transparent 55%),
    radial-gradient(ellipse 45% 55% at -10% 100%, rgba(0,115,170,0.15), transparent 55%),
    linear-gradient(150deg, #061020 0%, #0A1F36 55%, #0E2A4A 100%);
}
.um-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
}
.um-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 100px 0 80px;
}
.um-eyebrow { color: rgba(255,255,255,0.5); }
.um-hero-hl {
  font-family: var(--serif);
  font-size: clamp(36px, 5.5vw, 68px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -0.5px;
}
.um-hero-hl em { color: #7BC043; font-style: italic; }
.um-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.7);
  max-width: 580px;
  margin: 0 0 36px;
}
.um-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
.um-ghost { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.25); }
.um-ghost:hover { border-color: rgba(255,255,255,0.6); color: white; }
.um-hero-note {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
}

/* Edit types grid */
.um-edits {
  padding: 88px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.um-edits-hd { margin-bottom: 52px; max-width: 680px; }
.um-edits-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 16px;
}
.um-edits-sub { font-size: 15px; line-height: 1.7; color: var(--ink-2); margin: 0; }
.um-edits-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.um-edit-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s, box-shadow 0.22s;
}
.um-edit-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.um-edit-icon {
  font-size: 20px;
  color: var(--brand-blue);
  line-height: 1;
  font-style: normal;
}
.um-edit-title {
  font-family: var(--serif);
  font-size: 17px;
  color: var(--ink);
  font-weight: 400;
  line-height: 1.2;
}
.um-edit-body { font-size: 13px; line-height: 1.65; color: var(--ink-2); }

/* Process */
.um-process {
  padding: 88px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.um-process-hd { margin-bottom: 52px; }
.um-process-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.um-process-steps {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}
.um-step {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.um-step-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--brand-green);
  text-transform: uppercase;
}
.um-step-title {
  font-family: var(--serif);
  font-size: 24px;
  color: var(--ink);
  font-weight: 400;
}
.um-step-body { font-size: 14px; line-height: 1.7; color: var(--ink-2); margin: 0; }

/* Care plan upsell */
.um-careplan {
  padding: 88px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.um-careplan-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}
.um-careplan-eyebrow { color: var(--brand-blue); }
.um-careplan-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 36px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 16px;
  line-height: 1.15;
}
.um-careplan-body { font-size: 15px; line-height: 1.75; color: var(--ink-2); margin: 0 0 28px; }
.um-careplan-list {
  background: var(--navy);
  border-radius: var(--r-xl);
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.um-careplan-col-label {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 4px;
}
.um-careplan-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  font-size: 14px;
  color: rgba(255,255,255,0.8);
  line-height: 1.4;
}
.um-careplan-check { color: #7BC043; font-size: 12px; flex-shrink: 0; padding-top: 2px; }

/* Optimization services */
.um-opt {
  padding: 88px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.um-opt-hd { margin-bottom: 52px; max-width: 680px; }
.um-opt-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 12px;
}
.um-opt-sub { font-size: 15px; line-height: 1.7; color: var(--ink-2); margin: 0; }
.um-opt-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
.um-opt-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s, box-shadow 0.22s;
}
.um-opt-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.um-opt-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 20px;
  flex-shrink: 0;
}
.um-opt-title {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--ink);
  font-weight: 400;
  line-height: 1.2;
  margin: 0;
}
.um-opt-body { font-size: 14px; line-height: 1.7; color: var(--ink-2); margin: 0; flex: 1; }
.um-opt-link {
  font-size: 14px;
  font-weight: 500;
  color: var(--brand-blue);
  text-decoration: none;
  margin-top: 4px;
}
.um-opt-link:hover { text-decoration: underline; }

/* CTA */
.um-cta {
  padding: 80px 0;
  background: var(--navy);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.um-cta-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r-xl);
  padding: 52px 60px;
}
.um-cta-hl {
  font-family: var(--serif);
  font-size: clamp(22px, 2.8vw, 34px);
  color: white;
  font-weight: 400;
  font-style: italic;
  margin: 0 0 10px;
}
.um-cta-sub { font-size: 15px; color: rgba(255,255,255,0.6); margin: 0; max-width: 400px; }
.um-cta-related {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.um-cta-related-label {
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.um-cta-related-link { font-size: 13px; color: rgba(255,255,255,0.7); text-decoration: none; }
.um-cta-related-link:hover { color: white; }
.um-cta-actions { display: flex; gap: 14px; flex-wrap: wrap; flex-shrink: 0; }
.um-cta-ghost { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.2); }
.um-cta-ghost:hover { color: white; border-color: rgba(255,255,255,0.5); }

/* Responsive */
@media (max-width: 1100px) {
  .um-edits-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 960px) {
  .um-careplan-inner { grid-template-columns: 1fr; gap: 48px; }
  .um-cta-inner { padding: 40px 32px; flex-direction: column; align-items: flex-start; }
}
@media (max-width: 700px) {
  .um-process-steps { grid-template-columns: 1fr; }
  .um-opt-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .um-edits-grid { grid-template-columns: 1fr; }
  .um-hero-actions { flex-direction: column; align-items: flex-start; }
}
