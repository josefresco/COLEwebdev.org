<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>About Us — COLEwebdev · Cape Cod Web Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<meta name="description" content="Meet Josiah and Desiree Cole — the Cape Cod web design team behind COLEwebdev. Local since 2006, 700+ sites launched, and every project still handled personally." />
<link rel="canonical" href="https://colewebdev.org/about.html" />
<link rel="stylesheet" href="styles.css" />
<style>
/* ── About Us page ── */

.ab-hero {
  position: relative;
  overflow: hidden;
  min-height: 52vh;
  display: flex;
  align-items: center;
}
.ab-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 65% 55% at 105% -5%, rgba(123,192,67,0.22), transparent 55%),
    radial-gradient(ellipse 50% 60% at -5% 110%, rgba(14,42,74,0.30), transparent 55%),
    linear-gradient(150deg, #0F1A0E 0%, #162012 50%, #0E2A4A 100%);
}
.ab-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.016) 59px, rgba(255,255,255,0.016) 60px),
    repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.016) 59px, rgba(255,255,255,0.016) 60px);
}
.ab-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 100px 0 80px;
}
.ab-eyebrow { color: rgba(255,255,255,0.6); }
.ab-hero-hl {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 76px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1px;
}
.ab-hero-hl em { color: #7BC043; font-style: italic; }
.ab-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.72);
  max-width: 540px;
  margin: 0 0 36px;
}
.ab-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.ab-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
.ab-ghost:hover { border-color: rgba(255,255,255,0.7); color: white; }

/* Stats bar */
.ab-stats {
  background: var(--paper-2);
  border-bottom: 1px solid var(--line);
  padding: 0;
}
.ab-stats-inner {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  divide-x: 1px solid var(--line);
}
.ab-stat {
  padding: 36px 32px;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.ab-stat:last-child { border-right: none; }
.ab-stat-num {
  font-family: var(--serif);
  font-size: clamp(32px, 4vw, 52px);
  color: var(--ink);
  font-style: italic;
  line-height: 1;
}
.ab-stat-num em { color: #7BC043; font-style: normal; }
.ab-stat-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

/* Story */
.ab-story {
  padding: var(--pad-section) 0;
  background: var(--paper);
}
.ab-story-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 72px;
  align-items: center;
}
.ab-story-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  line-height: 1.18;
  margin: 10px 0 24px;
  color: var(--ink);
  font-weight: 400;
}
.ab-story-hl em { font-style: italic; color: #7BC043; }
.ab-story-p {
  font-size: 15px;
  line-height: 1.78;
  color: var(--ink-2);
  margin: 0 0 16px;
}
.ab-story-p:last-of-type { margin-bottom: 32px; }
.ab-story-media {
  position: relative;
}
.ab-story-img {
  width: 100%;
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-lg);
  display: block;
  aspect-ratio: 4/3;
  object-fit: cover;
}
.ab-story-badge {
  position: absolute;
  bottom: -16px;
  right: -16px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 14px 18px;
  box-shadow: var(--shadow-md);
}
.ab-story-badge-num {
  font-family: var(--serif);
  font-size: 28px;
  color: #7BC043;
  font-style: italic;
  line-height: 1;
  display: block;
}
.ab-story-badge-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}

/* Team */
.ab-team {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.ab-team-hd { margin-bottom: 48px; }
.ab-team-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 10px 0 0;
}
.ab-team-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.ab-person {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
}
.ab-person-img {
  width: 100%;
  aspect-ratio: 3/2;
  object-fit: cover;
  display: block;
}
.ab-person-body { padding: 28px 28px 32px; }
.ab-person-name {
  font-family: var(--serif);
  font-size: 28px;
  color: var(--ink);
  font-weight: 400;
  margin: 0 0 4px;
}
.ab-person-role {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #7BC043;
  margin-bottom: 16px;
  display: block;
}
.ab-person-bio {
  font-size: 14px;
  line-height: 1.72;
  color: var(--ink-2);
  margin: 0 0 20px;
}
.ab-person-contact {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.ab-person-link {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--ink-2);
  text-decoration: none;
  padding: 5px 12px;
  border: 1px solid var(--line);
  border-radius: 999px;
  transition: border-color 0.18s, color 0.18s;
}
.ab-person-link:hover { border-color: var(--brand-blue); color: var(--brand-blue); }

/* Awards */
.ab-awards {
  padding: var(--pad-section) 0;
  background: #0F1A0E;
  position: relative;
  overflow: hidden;
}
.ab-awards::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}
.ab-awards-hd { margin-bottom: 48px; position: relative; z-index: 1; }
.ab-awards .eyebrow { color: #7BC043; }
.ab-awards .eyebrow::before { background: #7BC043; }
.ab-awards-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: white;
  font-weight: 400;
  margin: 10px 0 0;
}
.ab-awards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  position: relative;
  z-index: 1;
}
.ab-award-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-lg);
  padding: 24px 22px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ab-award-year {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: #7BC043;
}
.ab-award-title {
  font-family: var(--serif);
  font-size: 18px;
  color: white;
  font-weight: 400;
  line-height: 1.3;
}
.ab-award-org {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  line-height: 1.4;
}

/* Chambers */
.ab-chambers {
  padding: var(--pad-section) 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.ab-chambers-hd { margin-bottom: 40px; }
.ab-chambers-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: var(--ink);
  font-weight: 400;
  margin: 10px 0 0;
}
.ab-chambers-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.ab-chamber-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 14px 20px;
  box-shadow: var(--shadow-sm);
}
.ab-chamber-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #7BC043;
  flex-shrink: 0;
}
.ab-chamber-name {
  font-size: 14px;
  color: var(--ink);
  font-weight: 500;
}

/* Testimonial */
.ab-testi {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.ab-testi-inner {
  max-width: 760px;
  margin: 0 auto;
  text-align: center;
}
.ab-quote-mark {
  font-family: var(--serif);
  font-size: 96px;
  line-height: 0.5;
  color: #7BC043;
  opacity: 0.22;
  display: block;
  margin-bottom: 16px;
}
.ab-quote {
  font-family: var(--serif);
  font-size: clamp(19px, 2.2vw, 25px);
  line-height: 1.6;
  color: var(--ink);
  font-style: italic;
  margin: 0 0 32px;
}
.ab-testi-meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.ab-testi-name { font-weight: 600; font-size: 14px; text-align: left; }
.ab-testi-role {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 3px;
  text-align: left;
}

/* CTA */
.ab-cta-section { padding: var(--pad-section) 0; background: white; }
.ab-cta {
  background: #0F1A0E;
  border-radius: var(--r-xl);
  padding: 64px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 40px;
  align-items: center;
}
.ab-cta-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: white;
  margin: 0 0 12px;
  font-weight: 400;
}
.ab-cta-hl em { font-style: italic; color: #7BC043; }
.ab-cta-sub {
  color: rgba(255,255,255,0.6);
  font-size: 15px;
  line-height: 1.65;
  max-width: 48ch;
  margin: 0;
}
.ab-cta-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

/* Responsive */
@media (max-width: 960px) {
  .ab-stats-inner { grid-template-columns: repeat(2, 1fr); }
  .ab-stat:nth-child(2) { border-right: none; }
  .ab-stat:nth-child(3) { border-top: 1px solid var(--line); }
  .ab-stat:nth-child(4) { border-top: 1px solid var(--line); border-right: none; }
  .ab-story-grid { grid-template-columns: 1fr; gap: 40px; }
  .ab-story-badge { right: 16px; }
  .ab-team-grid { grid-template-columns: 1fr; max-width: 540px; }
  .ab-awards-grid { grid-template-columns: repeat(2, 1fr); }
  .ab-cta { grid-template-columns: 1fr; }
  .ab-cta-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
}
@media (max-width: 560px) {
  .ab-stats-inner { grid-template-columns: 1fr 1fr; }
  .ab-awards-grid { grid-template-columns: 1fr; }
  .ab-hero-actions { flex-direction: column; align-items: flex-start; }
  .ab-cta { padding: 36px 28px; }
}
</style>
