<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shop — COLEwebdev · Cape Cod Web Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
/* ── Shop page ── */

/* Intro */
.sh-intro {
  padding: 72px 0 0;
  background: var(--paper);
}
.sh-intro-hl {
  font-family: var(--serif);
  font-size: clamp(48px, 7vw, 96px);
  line-height: 1;
  margin: 14px 0 0;
  color: var(--ink);
  font-weight: 400;
  font-style: italic;
  letter-spacing: -2px;
}

/* Hero */
.sh-hero {
  padding: 56px 0 72px;
  background: var(--paper);
}
.sh-hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
}
.sh-hero-img-wrap {
  border-radius: var(--r-xl);
  overflow: hidden;
  aspect-ratio: 4 / 3;
  background: var(--paper-2);
}
.sh-hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}
.sh-hero-img-wrap:hover .sh-hero-img { transform: scale(1.03); }
.sh-hero-body {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.sh-hero-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  line-height: 1.15;
  color: var(--ink);
  font-weight: 400;
  margin: 0;
}
.sh-hero-p {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-2);
  margin: 0;
}

/* Print-on-demand strip */
.sh-pod {
  background: var(--paper-2);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 20px 0;
}
.sh-pod-inner {
  display: flex;
  align-items: center;
  gap: 40px;
  flex-wrap: wrap;
}
.sh-pod-item {
  display: flex;
  align-items: center;
  gap: 10px;
}
.sh-pod-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: rgba(123,192,67,0.15);
  color: #5DA02E;
  display: grid;
  place-items: center;
  font-size: 15px;
  flex-shrink: 0;
}
.sh-pod-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-2);
}

/* Categories */
.sh-cats {
  padding: 72px 0;
  background: var(--paper);
}
.sh-cats-hd {
  margin-bottom: 40px;
}
.sh-cats-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: var(--ink);
  font-weight: 400;
  margin: 0 0 6px;
}
.sh-cats-sub {
  font-size: 14px;
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: 0.04em;
}
.sh-cats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}
.sh-cat-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  text-decoration: none;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.sh-cat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
}
.sh-cat-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 18px;
  flex-shrink: 0;
}
.sh-cat-name {
  font-family: var(--serif);
  font-size: 21px;
  color: var(--ink);
  margin-bottom: 4px;
  font-weight: 400;
}
.sh-cat-desc {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  line-height: 1.55;
  color: var(--muted);
}

/* CTA strip */
.sh-cta {
  padding: 72px 0;
  background: var(--navy);
}
.sh-cta-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  flex-wrap: wrap;
}
.sh-cta-text {
  font-family: var(--serif);
  font-size: clamp(20px, 2.5vw, 30px);
  color: white;
  margin: 0;
  font-style: italic;
  line-height: 1.3;
}

/* Responsive */
@media (max-width: 960px) {
  .sh-hero-grid { grid-template-columns: 1fr; gap: 40px; }
  .sh-cats-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px) {
  .sh-cats-grid { grid-template-columns: 1fr; }
  .sh-intro-hl { letter-spacing: -1px; }
  .sh-cta-inner { flex-direction: column; align-items: flex-start; }
  .sh-pod-inner { gap: 20px; }
}
</style>
</head>

<div id="root"></div>

</html>
