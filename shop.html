<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shop — COLEwebdev · Cape Cod Web Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<meta name="description" content="Shop COLEwebdev branded merchandise — tees, hoodies, hats, and tote bags. Printed on demand by Printful and shipped directly to your door." />

<style>
/* ── Shop page ── */

/* Intro */
.sh-intro {
  padding: 72px 0 0;
  background: var(--paper);
}
.sh-intro-hl {
  font-family: var(--serif);
  font-size: clamp(48px, 7vw, 96px);
  line-height: 1;
  margin: 14px 0 0;
  color: var(--ink);
  font-weight: 400;
  font-style: italic;
  letter-spacing: -2px;
}

/* Hero */
.sh-hero {
  padding: 56px 0 72px;
  background: var(--paper);
}
.sh-hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
}
.sh-hero-img-wrap {
  border-radius: var(--r-xl);
  overflow: hidden;
  aspect-ratio: 4 / 3;
  background: var(--paper-2);
}
.sh-hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}
.sh-hero-img-wrap:hover .sh-hero-img { transform: scale(1.03); }
.sh-hero-body {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.sh-hero-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  line-height: 1.15;
  color: var(--ink);
  font-weight: 400;
  margin: 0;
}
.sh-hero-p {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-2);
  margin: 0;
}

/* Print-on-demand strip */
.sh-pod {
  background: var(--paper-2);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 20px 0;
}
.sh-pod-inner {
  display: flex;
  align-items: center;
  gap: 40px;
  flex-wrap: wrap;
}
.sh-pod-item {
  display: flex;
  align-items: center;
  gap: 10px;
}
.sh-pod-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: rgba(123,192,67,0.15);
  color: #5DA02E;
  display: grid;
  place-items: center;
  font-size: 15px;
  flex-shrink: 0;
}
.sh-pod-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-2);
}

/* Product grid */
.sh-prods {
  padding: 72px 0;
  background: var(--paper);
}
.sh-prods-hd {
  margin-bottom: 40px;
}
.sh-prods-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: var(--ink);
  font-weight: 400;
  margin: 0 0 6px;
}
.sh-prods-sub {
  font-size: 13px;
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: 0.04em;
}
.sh-prods-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}
.sh-prod-card {
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 0;
  border-radius: var(--r-xl);
  overflow: hidden;
  border: 1px solid var(--line);
  background: white;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.sh-prod-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
}
.sh-prod-img-wrap {
  aspect-ratio: 1 / 1;
  background: var(--paper-2);
  overflow: hidden;
}
.sh-prod-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.35s ease;
}
.sh-prod-card:hover .sh-prod-img { transform: scale(1.05); }
.sh-prod-info {
  padding: 14px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sh-prod-name {
  font-size: 13.5px;
  color: var(--ink);
  line-height: 1.35;
  font-weight: 500;
}
.sh-prod-price {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  color: var(--brand-green);
}

/* Why Printful */
.sh-why {
  padding: 72px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.sh-why-hd {
  margin-bottom: 40px;
}
.sh-why-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.sh-why-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}
.sh-why-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sh-why-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  font-size: 16px;
  flex-shrink: 0;
}
.sh-why-title {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--ink);
  font-weight: 400;
}
.sh-why-body {
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink-2);
}

/* Want your own store */
.sh-own {
  padding: 72px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.sh-own-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
}
.sh-own-body {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.sh-own-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 0;
  line-height: 1.2;
}
.sh-own-p {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-2);
  margin: 0;
}
.sh-own-steps {
  display: flex;
  flex-direction: column;
  gap: 0;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  overflow: hidden;
  background: white;
}
.sh-own-step {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--line);
}
.sh-own-step:last-child { border-bottom: none; }
.sh-own-step-n {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--brand-green);
  flex-shrink: 0;
}
.sh-own-step-label {
  font-size: 14px;
  color: var(--ink);
}

/* CTA strip */
.sh-cta {
  padding: 72px 0;
  background: var(--navy);
}
.sh-cta-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  flex-wrap: wrap;
}
.sh-cta-text {
  font-family: var(--serif);
  font-size: clamp(20px, 2.5vw, 30px);
  color: white;
  margin: 0;
  font-style: italic;
  line-height: 1.3;
}

/* Responsive */
@media (max-width: 1100px) {
  .sh-why-grid { grid-template-columns: repeat(3, 1fr); }
  .sh-prods-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 960px) {
  .sh-hero-grid { grid-template-columns: 1fr; gap: 40px; }
  .sh-prods-grid { grid-template-columns: repeat(2, 1fr); }
  .sh-why-grid { grid-template-columns: repeat(2, 1fr); }
  .sh-own-inner { grid-template-columns: 1fr; gap: 40px; }
}
@media (max-width: 560px) {
  .sh-prods-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .sh-why-grid { grid-template-columns: 1fr; }
  .sh-intro-hl { letter-spacing: -1px; }
  .sh-cta-inner { flex-direction: column; align-items: flex-start; }
  .sh-pod-inner { gap: 20px; }
}
</style>
