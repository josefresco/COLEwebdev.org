<head>

<title>WordPress Website Design — COLEwebdev · Cape Cod Web Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

{
  "@context": "https://schema.org",
  "@type": "Service",
  "name": "WordPress Website Design",
  "url": "https://colewebdev.org/wordpress.html",
  "description": "Custom WordPress websites for Cape Cod businesses. Custom theme, lean plugin stack, client-managed content. Fast, secure, and built to scale.",
  "provider": { "@type": "ProfessionalService", "name": "COLEwebdev", "url": "https://colewebdev.org/" },
  "areaServed": { "@type": "State", "name": "Cape Cod, Massachusetts" },
  "serviceType": "WordPress Web Design"
}
</script>
<style>
/* ── WordPress Website Design page ── */

.wp-hero {
  position: relative;
  overflow: hidden;
  min-height: 52vh;
  display: flex;
  align-items: center;
}
.wp-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 65% 55% at 110% -10%, rgba(0,115,170,0.35), transparent 55%),
    radial-gradient(ellipse 45% 55% at -10% 110%, rgba(33,117,155,0.20), transparent 55%),
    linear-gradient(150deg, #0A1628 0%, #0D1F3C 50%, #0E2A4A 100%);
}
.wp-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.015) 59px, rgba(255,255,255,0.015) 60px),
    repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.015) 59px, rgba(255,255,255,0.015) 60px);
}
.wp-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 100px 0 80px;
}
.wp-eyebrow { color: rgba(255,255,255,0.6); }
.wp-hero-hl {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 76px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1px;
}
.wp-hero-hl em { color: #3EB0EF; font-style: italic; }
.wp-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.72);
  max-width: 540px;
  margin: 0 0 36px;
}
.wp-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.wp-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
.wp-ghost:hover { border-color: rgba(255,255,255,0.7); color: white; }
.wp-hero-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 36px; }
.wp-hero-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.65);
}

/* Why section */
.wp-why {
  padding: var(--pad-section) 0;
  background: var(--paper);
}
.wp-why-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
}
.wp-why-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  line-height: 1.18;
  margin: 10px 0 22px;
  color: var(--ink);
  font-weight: 400;
}
.wp-why-hl em { font-style: italic; color: #0073AA; }
.wp-why-p {
  font-size: 15px;
  line-height: 1.78;
  color: var(--ink-2);
  margin: 0 0 16px;
  max-width: 52ch;
}
.wp-why-p:last-of-type { margin-bottom: 32px; }

/* Dashboard mockup */
.wp-dash {
  background: #1E2330;
  border-radius: var(--r-xl);
  border: 1px solid rgba(255,255,255,0.08);
  overflow: hidden;
}
.wp-dash-bar {
  background: #23282D;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.wp-dash-wp-logo {
  width: 20px;
  height: 20px;
  background: #0073AA;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 10px;
  color: white;
  font-weight: 700;
  flex-shrink: 0;
}
.wp-dash-site-name {
  font-family: var(--mono);
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  flex: 1;
}
.wp-dash-pill {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(0,115,170,0.25);
  color: #3EB0EF;
  border: 1px solid rgba(0,115,170,0.3);
}
.wp-dash-body {
  display: grid;
  grid-template-columns: 140px 1fr;
  min-height: 220px;
}
.wp-dash-sidebar {
  background: #1A1F2B;
  padding: 16px 0;
  border-right: 1px solid rgba(255,255,255,0.05);
}
.wp-dash-menu-item {
  padding: 7px 16px;
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: default;
}
.wp-dash-menu-item.active {
  color: white;
  background: rgba(0,115,170,0.25);
  border-left: 2px solid #0073AA;
}
.wp-dash-menu-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.wp-dash-content {
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.wp-dash-row {
  height: 10px;
  border-radius: 4px;
  background: rgba(255,255,255,0.07);
}
.wp-dash-row.w-full { width: 100%; }
.wp-dash-row.w-3q  { width: 75%; }
.wp-dash-row.w-half { width: 50%; }
.wp-dash-row.w-2q { width: 40%; }
.wp-dash-row.accent { background: rgba(0,115,170,0.30); width: 30%; }
.wp-dash-btn {
  margin-top: 4px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  padding: 5px 12px;
  border-radius: 4px;
  background: #0073AA;
  color: white;
  width: fit-content;
}

/* What we build */
.wp-what {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.wp-what-hd { margin-bottom: 48px; }
.wp-what-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 10px 0 0;
}
.wp-what-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.wp-what-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s, box-shadow 0.22s;
}
.wp-what-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.wp-what-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 18px;
  flex-shrink: 0;
}
.wp-what-title {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--ink);
  font-weight: 400;
}
.wp-what-body {
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--ink-2);
}

/* Portfolio */
.wp-portfolio {
  padding: var(--pad-section) 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.wp-portfolio-hd { margin-bottom: 48px; }
.wp-portfolio-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 10px 0 0;
}
.wp-portfolio-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.wp-portfolio-item {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: box-shadow 0.18s, border-color 0.18s;
}
.wp-portfolio-item:hover {
  border-color: #0073AA;
  box-shadow: var(--shadow-sm);
}
.wp-portfolio-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #0073AA;
  flex-shrink: 0;
}
.wp-portfolio-name {
  font-size: 13.5px;
  color: var(--ink);
  line-height: 1.4;
}
.wp-portfolio-footer {
  margin-top: 40px;
  display: flex;
  justify-content: center;
}

/* Advantages strip */
.wp-adv {
  padding: var(--pad-section) 0;
  background: #0A1628;
  position: relative;
  overflow: hidden;
}
.wp-adv::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}
.wp-adv-hd { margin-bottom: 48px; position: relative; z-index: 1; }
.wp-adv .eyebrow { color: #3EB0EF; }
.wp-adv .eyebrow::before { background: #3EB0EF; }
.wp-adv-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 42px);
  color: white;
  font-weight: 400;
  margin: 10px 0 0;
}
.wp-adv-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  position: relative;
  z-index: 1;
}
.wp-adv-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-lg);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.wp-adv-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: #3EB0EF;
}
.wp-adv-title {
  font-family: var(--serif);
  font-size: 21px;
  color: white;
  font-weight: 400;
}
.wp-adv-body {
  font-size: 13.5px;
  line-height: 1.65;
  color: rgba(255,255,255,0.6);
}

/* Testimonial */
.wp-testi {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.wp-testi-inner {
  max-width: 760px;
  margin: 0 auto;
  text-align: center;
}
.wp-quote-mark {
  font-family: var(--serif);
  font-size: 96px;
  line-height: 0.5;
  color: #0073AA;
  opacity: 0.22;
  display: block;
  margin-bottom: 16px;
}
.wp-quote {
  font-family: var(--serif);
  font-size: clamp(19px, 2.2vw, 25px);
  line-height: 1.6;
  color: var(--ink);
  font-style: italic;
  margin: 0 0 32px;
}
.wp-testi-meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.wp-testi-name { font-weight: 600; font-size: 14px; text-align: left; }
.wp-testi-role {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 3px;
  text-align: left;
}

/* CTA */
.wp-cta-section { padding: var(--pad-section) 0; background: white; }
.wp-cta {
  background: #0A1628;
  border-radius: var(--r-xl);
  padding: 64px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 40px;
  align-items: center;
}
.wp-cta-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: white;
  margin: 0 0 12px;
  font-weight: 400;
}
.wp-cta-hl em { font-style: italic; color: #3EB0EF; }
.wp-cta-sub {
  color: rgba(255,255,255,0.6);
  font-size: 15px;
  line-height: 1.65;
  max-width: 48ch;
  margin: 0;
}
.wp-cta-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

/* Cross-link nudge */
.wp-trad-nudge {
  padding: 28px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.wp-trad-nudge-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.wp-trad-nudge-left {
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.wp-trad-nudge-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: white;
  background: #0073AA;
  padding: 3px 10px;
  border-radius: 999px;
  white-space: nowrap;
}
.wp-trad-nudge-text {
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.5;
  max-width: 54ch;
}
.wp-trad-nudge-link { white-space: nowrap; flex-shrink: 0; }

/* Responsive */
@media (max-width: 960px) {
  .wp-why-grid { grid-template-columns: 1fr; gap: 40px; }
  .wp-what-grid { grid-template-columns: repeat(2, 1fr); }
  .wp-portfolio-grid { grid-template-columns: repeat(2, 1fr); }
  .wp-adv-grid { grid-template-columns: repeat(2, 1fr); }
  .wp-cta { grid-template-columns: 1fr; }
  .wp-cta-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
}
@media (max-width: 560px) {
  .wp-what-grid { grid-template-columns: 1fr; }
  .wp-portfolio-grid { grid-template-columns: 1fr 1fr; }
  .wp-adv-grid { grid-template-columns: 1fr; }
  .wp-hero-actions { flex-direction: column; align-items: flex-start; }
  .wp-cta { padding: 36px 28px; }
}
</style>
</head>

<div id="root"></div>
