<style>
/* ── Maine Web Design page ── */

/* Hero — photo background */
.mn-hero {
  position: relative;
  overflow: hidden;
  min-height: 60vh;
  display: flex;
  align-items: center;
}
.mn-hero-img {
  position: absolute;
  inset: 0;
  background-image: url('assets/colewebdev-website-design-build-cape-cod-modern-mountains-1.jpg');
  background-size: cover;
  background-position: center 35%;
}
.mn-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(8,18,34,0.90) 0%, rgba(12,30,54,0.82) 55%, rgba(6,14,28,0.88) 100%);
}
.mn-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 110px 0 90px;
}
.mn-eyebrow { color: rgba(255,255,255,0.5); }
.mn-hero-hl {
  font-family: var(--serif);
  font-size: clamp(42px, 6.5vw, 82px);
  line-height: 1.04;
  color: white;
  font-weight: 400;
  margin: 14px 0 22px;
  letter-spacing: -1.5px;
}
.mn-hero-hl em { font-style: italic; color: #5CC035; }
.mn-hero-sub {
  font-size: 17px;
  line-height: 1.68;
  color: rgba(255,255,255,0.7);
  max-width: 560px;
  margin: 0 0 36px;
}
.mn-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.mn-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
.mn-ghost:hover { border-color: rgba(255,255,255,0.7); color: white; }
.mn-hero-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 44px; }
.mn-hero-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.14);
  padding: 5px 13px;
  border-radius: 999px;
}

/* Roots */
.mn-roots {
  padding: var(--pad-section) 0;
  background: var(--paper);
  border-bottom: 1px solid var(--line);
}
.mn-roots-grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 64px;
  align-items: start;
}
.mn-roots-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 10px 0 24px;
  line-height: 1.15;
}
.mn-roots-hl em { font-style: italic; color: var(--brand-blue); }
.mn-roots-body {
  font-size: 15.5px;
  line-height: 1.78;
  color: var(--ink-2);
  margin: 0 0 18px;
}

/* Facts card */
.mn-facts-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 32px 28px;
  box-shadow: var(--shadow-sm);
  position: sticky;
  top: 100px;
}
.mn-facts-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 0 0 20px;
}
.mn-fact-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 1px solid var(--line);
}
.mn-fact-row:last-of-type { border-bottom: none; margin-bottom: 8px; }
.mn-fact-label { font-size: 13px; color: var(--muted); }
.mn-fact-val { font-size: 13px; font-weight: 500; color: var(--ink); text-align: right; }
.mn-facts-cta { width: 100%; justify-content: center; margin-top: 20px; }

/* Services */
.mn-services {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
  border-bottom: 1px solid var(--line);
}
.mn-services-hd { margin-bottom: 48px; max-width: 640px; }
.mn-services-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 10px 0 14px;
}
.mn-services-sub { font-size: 15px; line-height: 1.7; color: var(--ink-2); margin: 0; }
.mn-services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.mn-service-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: var(--shadow-sm);
  transition: transform .2s, box-shadow .2s;
}
.mn-service-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.mn-service-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: grid; place-items: center;
  font-size: 18px; flex-shrink: 0;
}
.mn-service-title { font-family: var(--serif); font-size: 20px; color: var(--ink); font-weight: 400; }
.mn-service-body { font-size: 13.5px; line-height: 1.65; color: var(--ink-2); }
.mn-services-more { margin-top: 40px; }

/* Duck Puddle spotlight */
.mn-spotlight {
  padding: var(--pad-section) 0;
  background: var(--paper);
  border-bottom: 1px solid var(--line);
}
.mn-spotlight-inner {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 64px;
  align-items: center;
}
.mn-spotlight-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 10px 0 20px;
}
.mn-spotlight-body { font-size: 15.5px; line-height: 1.78; color: var(--ink-2); margin: 0 0 18px; }
.mn-spotlight-card {
  background: linear-gradient(145deg, #0A1628 0%, #0E2A4A 100%);
  border-radius: var(--r-xl);
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  color: white;
}
.mn-spotlight-glyph {
  font-size: 28px;
  color: #5CC035;
  line-height: 1;
  margin-bottom: 4px;
}
.mn-spotlight-name { font-family: var(--serif); font-size: 22px; font-weight: 400; }
.mn-spotlight-type { font-size: 13px; color: rgba(255,255,255,0.5); }
.mn-spotlight-tags { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0; }
.mn-spotlight-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  border: 1px solid rgba(255,255,255,0.18);
  padding: 4px 11px;
  border-radius: 999px;
}
.mn-spotlight-quote {
  font-size: 13px;
  line-height: 1.6;
  color: rgba(255,255,255,0.55);
  font-style: italic;
  margin: 8px 0 0;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

/* Industries */
.mn-industries {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
  border-bottom: 1px solid var(--line);
}
.mn-industries-hd { margin-bottom: 48px; }
.mn-industries-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 10px 0 0;
}
.mn-industries-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.mn-industry-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: var(--shadow-sm);
}
.mn-industry-icon {
  width: 42px; height: 42px;
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 17px; flex-shrink: 0;
}
.mn-industry-title { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.3; }
.mn-industry-body { font-size: 13px; line-height: 1.65; color: var(--ink-2); }

/* FAQ */
.mn-faq {
  padding: var(--pad-section) 0;
  background: var(--paper);
  border-bottom: 1px solid var(--line);
}
.mn-faq-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: var(--ink);
  font-weight: 400;
  margin: 10px 0 40px;
}
.mn-faq-list { display: flex; flex-direction: column; }
.mn-faq-item { padding: 28px 0; border-bottom: 1px solid var(--line); }
.mn-faq-item:first-child { border-top: 1px solid var(--line); }
.mn-faq-q {
  font-family: var(--serif);
  font-size: clamp(17px, 2vw, 21px);
  font-weight: 400;
  color: var(--navy);
  margin: 0 0 12px;
}
.mn-faq-a { font-size: 15px; line-height: 1.72; color: var(--ink-2); margin: 0; max-width: 760px; }

/* CTA */
.mn-cta {
  padding: var(--pad-section) 0;
  background: var(--navy);
}
.mn-cta-inner {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 48px;
  align-items: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r-xl);
  padding: 56px 60px;
}
.mn-cta-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: white;
  font-weight: 400;
  margin: 0 0 12px;
}
.mn-cta-hl em { font-style: italic; color: #5CC035; }
.mn-cta-sub { font-size: 15px; line-height: 1.65; color: rgba(255,255,255,0.6); max-width: 480px; margin: 0; }
.mn-cta-related { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
.mn-cta-related-label { font-size: 10px; font-family: var(--mono); letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
.mn-cta-related-link { font-size: 13px; color: rgba(255,255,255,0.65); text-decoration: none; }
.mn-cta-related-link:hover { color: white; }
.mn-cta-actions { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; flex-shrink: 0; }

/* Responsive */
@media (max-width: 1060px) {
  .mn-roots-grid { grid-template-columns: 1fr; gap: 40px; }
  .mn-facts-card { position: static; }
  .mn-spotlight-inner { grid-template-columns: 1fr; gap: 40px; }
  .mn-services-grid { grid-template-columns: repeat(2, 1fr); }
  .mn-industries-grid { grid-template-columns: repeat(2, 1fr); }
  .mn-cta-inner { grid-template-columns: 1fr; }
  .mn-cta-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
}
@media (max-width: 680px) {
  .mn-services-grid { grid-template-columns: 1fr; }
  .mn-industries-grid { grid-template-columns: 1fr; }
  .mn-cta-inner { padding: 36px 28px; }
  .mn-hero-hl { letter-spacing: -.5px; }
}
</style>
