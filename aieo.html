/* Hero */

  position: relative;
  overflow: hidden;
  min-height: 56vh;
  display: flex;
  align-items: center;
}
.aieo-hero-bg {

}

  inset: 0;
  background-image:

}
.aieo-hero-content {

  width: 100%;
  padding: 100px 0 88px;
}
.aieo-eyebrow { color: rgba(255,255,255,0.55); }
.aieo-hero-hl {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 76px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1px;
}
.aieo-hero-hl em { color: #7BC043; font-style: italic; }
.aieo-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.7);

}
.aieo-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.aieo-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }

}

.aieo-cta { padding: 80px 0; background: var(--navy); }
.aieo-cta-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;

  flex-wrap: wrap;

  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r-xl);
