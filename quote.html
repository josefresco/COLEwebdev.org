  "@type": "ContactPage",
  "name": "Request a Quote — COLEwebdev",
  "url": "https://colewebdev.org/quote.html",
  "description": "Request a project quote from COLEwebdev. Tell us about your website project and we'll respond within one business day with a scope and price.",
  "provider": { "@type": "ProfessionalService", "name": "COLEwebdev", "url": "https://colewebdev.org/" }
}

<style>
/* ── Request a Quote page ── */

.rq-hero {
  position: relative;
  overflow: hidden;
  min-height: 36vh;
  display: flex;
  align-items: center;
}
.rq-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 60% at 100% 0%, rgba(92,192,53,0.18), transparent 55%),
    radial-gradient(ellipse 45% 55% at 0% 100%, rgba(14,42,74,0.28), transparent 55%),
    linear-gradient(145deg, #061828 0%, #0E2A4A 100%);
}
.rq-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,0.014) 79px, rgba(255,255,255,0.014) 80px),
    repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.014) 79px, rgba(255,255,255,0.014) 80px);
}
.rq-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 88px 0 72px;
}
.rq-eyebrow { color: rgba(255,255,255,0.55); }
.rq-hero-hl {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 72px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 18px;
  letter-spacing: -1px;
}
.rq-hero-hl em { font-style: italic; color: #5CC035; }
.rq-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.68);
  max-width: 500px;
  margin: 0;
}

/* Layout */
.rq-section {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
}
.rq-layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 48px;
  align-items: start;
}

/* Sidebar */
.rq-sidebar-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px 24px;
  box-shadow: var(--shadow-sm);
  position: sticky;
  top: 100px;
}
.rq-sidebar-avatars {
  display: flex;
  margin-bottom: 16px;
}
.rq-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  border: 3px solid white;
  box-shadow: 0 0 0 2px var(--brand-green), 0 4px 10px rgba(14,42,74,0.12);
}
.rq-avatar + .rq-avatar {
  margin-left: -12px;
  box-shadow: 0 0 0 2px var(--brand-blue), 0 4px 10px rgba(14,42,74,0.12);
}
.rq-sidebar-note {
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--ink-2);
  margin: 0 0 20px;
}
.rq-sidebar-divider {
  height: 1px;
  background: var(--line);
  margin: 0 0 18px;
}
.rq-sidebar-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 14px;
}
.rq-sidebar-item:last-child { margin-bottom: 0; }
.rq-sidebar-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.rq-sidebar-val {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink);
}
.rq-sidebar-link {
  color: var(--brand-blue);
  text-decoration: none;
  font-weight: 400;
}
.rq-sidebar-link:hover { text-decoration: underline; }

/* Form */
.rq-form {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.rq-form-section {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 32px 32px 28px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.rq-form-section:last-child { margin-bottom: 0; }
.rq-form-section-hl {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  color: var(--ink);
  margin: 0 0 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}
.rq-form-section-desc {
  font-size: 13.5px;
  color: var(--ink-2);
  line-height: 1.6;
  margin: -10px 0 18px;
}
.rq-optional {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 400;
  text-transform: uppercase;
}
.rq-req { color: var(--brand-blue); }

/* Fields */
.rq-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.rq-grid-2:last-child { margin-bottom: 0; }
.rq-field { display: flex; flex-direction: column; gap: 6px; }
.rq-field--mt { margin-top: 14px; }
.rq-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-2);
  font-weight: 500;
}
.rq-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--line-2);
  border-radius: var(--r-md);
  font-size: 14px;
  font-family: var(--sans);
  color: var(--ink);
  background: var(--paper);
  transition: border-color 0.18s, box-shadow 0.18s;
  box-sizing: border-box;
}
.rq-input:focus {
  outline: none;
  border-color: var(--brand-blue);
  box-shadow: 0 0 0 3px rgba(33,146,188,0.12);
}
.rq-textarea { resize: vertical; min-height: 130px; line-height: 1.6; }

/* Radio & checkbox groups */
.rq-radio-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.rq-radio-group--wrap {
  flex-direction: row;
  flex-wrap: wrap;
  gap: 8px;
}
.rq-radio-label {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  font-size: 14px;
  color: var(--ink);
}
.rq-radio-label--pill {
  padding: 8px 16px;
  border: 1px solid var(--line-2);
  border-radius: 999px;
  transition: border-color 0.15s, background 0.15s;
}
.rq-radio-label--pill:has(.rq-radio:checked) {
  border-color: var(--brand-blue);
  background: rgba(33,146,188,0.06);
  color: var(--brand-blue);
  font-weight: 500;
}
.rq-radio { accent-color: var(--brand-blue); width: 15px; height: 15px; }
.rq-check-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.rq-check-label {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  font-size: 14px;
  color: var(--ink);
}
.rq-check { accent-color: var(--brand-blue); width: 15px; height: 15px; flex-shrink: 0; }

/* Footer */
.rq-form-footer {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 32px;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.rq-newsletter { align-items: flex-start; font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }
.rq-error {
  font-size: 13px;
  color: #c0392b;
  margin: 0;
}
.rq-submit-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.rq-submit-note {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

/* Success */
.rq-success {
  padding: 120px 0;
  background: var(--paper-2);
  min-height: 60vh;
  display: flex;
  align-items: center;
}
.rq-success-inner {
  max-width: 540px;
  margin: 0 auto;
  text-align: center;
}
.rq-success-icon {
  width: 56px;
  height: 56px;
  border-radius: 999px;
  background: rgba(92,192,53,0.14);
  color: #3a8a1a;
  display: grid;
  place-items: center;
  font-size: 26px;
  margin: 0 auto 24px;
}
.rq-success-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 4vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 0 0 16px;
}
.rq-success-sub {
  font-size: 16px;
  line-height: 1.7;
  color: var(--ink-2);
  margin: 0 0 32px;
}

/* Responsive */
@media (max-width: 960px) {
  .rq-layout { grid-template-columns: 1fr; }
  .rq-sidebar-card { position: static; }
  .rq-sidebar { order: 2; }
  .rq-form { order: 1; }
}
@media (max-width: 580px) {
  .rq-grid-2 { grid-template-columns: 1fr; }
  .rq-check-group { grid-template-columns: 1fr; }
  .rq-form-section { padding: 24px 20px; }
  .rq-form-footer { padding: 24px 20px; }
  .rq-submit-row { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
