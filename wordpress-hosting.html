<style>
/* ── WordPress Hosting page ── */

/* Hero */
.wph-hero {
  position: relative;
  overflow: hidden;
  min-height: 56vh;
  display: flex;
  align-items: center;
}
.wph-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 65% at 110% 0%, rgba(14,42,74,0.6), transparent 55%),
    radial-gradient(ellipse 45% 55% at -10% 100%, rgba(123,192,67,0.15), transparent 55%),
    linear-gradient(150deg, #061020 0%, #0A1F36 55%, #0E2A4A 100%);
}
.wph-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
}
.wph-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 100px 0 88px;
}
.wph-eyebrow { color: rgba(255,255,255,0.5); }
.wph-hero-hl {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 76px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1px;
}
.wph-hero-hl em { color: #7BC043; font-style: italic; }
.wph-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.7);
  max-width: 560px;
  margin: 0 0 36px;
}
.wph-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 48px; }
.wph-ghost { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.25); }
.wph-ghost:hover { border-color: rgba(255,255,255,0.6); color: white; }

/* Spec strip */
.wph-spec-strip {
  display: flex;
  gap: 0;
  flex-wrap: wrap;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--r-lg);
  overflow: hidden;
  width: fit-content;
}
.wph-spec {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 16px 28px;
  border-right: 1px solid rgba(255,255,255,0.12);
}
.wph-spec:last-child { border-right: none; }
.wph-spec-val {
  font-family: var(--serif);
  font-size: 22px;
  color: #7BC043;
  font-style: italic;
  line-height: 1;
}
.wph-spec-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}

/* Features */
.wph-features {
  padding: 88px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.wph-features-hd { margin-bottom: 52px; max-width: 680px; }
.wph-features-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 16px;
}
.wph-features-sub {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-2);
  margin: 0;
}
.wph-features-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.wph-feat-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s, box-shadow 0.22s;
}
.wph-feat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.wph-feat-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  font-size: 16px;
  flex-shrink: 0;
}
.wph-feat-title {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--ink);
  font-weight: 400;
  line-height: 1.2;
}
.wph-feat-body {
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink-2);
}

/* Comparison */
.wph-vs {
  padding: 88px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.wph-vs-hd { margin-bottom: 52px; max-width: 700px; }
.wph-vs-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 16px;
  line-height: 1.15;
}
.wph-vs-sub { font-size: 15px; line-height: 1.7; color: var(--ink-2); margin: 0; }
.wph-vs-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.wph-vs-col {
  border-radius: var(--r-xl);
  padding: 32px 28px;
  border: 1px solid var(--line);
}
.wph-vs-col.is-bad { background: white; }
.wph-vs-col.is-good { background: var(--navy); }
.wph-vs-col-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.is-bad .wph-vs-col-label { color: var(--muted); }
.is-good .wph-vs-col-label { color: #7BC043; }
.wph-vs-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
.wph-vs-item {
  font-size: 14px;
  line-height: 1.5;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.is-bad .wph-vs-item { color: var(--ink-2); }
.is-good .wph-vs-item { color: rgba(255,255,255,0.85); }
.wph-vs-icon { flex-shrink: 0; font-size: 13px; padding-top: 1px; }
.is-bad .wph-vs-icon { color: #e74c3c; }
.is-good .wph-vs-icon { color: #7BC043; }

/* Staging callout */
.wph-staging {
  padding: 88px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.wph-staging-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}
.wph-staging-eyebrow { color: var(--brand-blue); }
.wph-staging-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 40px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 20px;
  line-height: 1.15;
}
.wph-staging-body {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-2);
  margin: 0 0 16px;
}
.wph-staging-card {
  background: var(--navy);
  border-radius: var(--r-xl);
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.wph-stage-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px 20px;
  border-radius: var(--r-lg);
  border: 1px solid rgba(255,255,255,0.1);
}
.wph-stage-item--live { background: rgba(255,255,255,0.06); }
.wph-stage-item--staging { background: rgba(123,192,67,0.1); border-color: rgba(123,192,67,0.25); }
.wph-stage-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #7BC043;
  flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(123,192,67,0.25);
}
.wph-stage-dot--staging { background: rgba(255,255,255,0.4); box-shadow: none; }
.wph-stage-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  min-width: 60px;
}
.wph-stage-url {
  font-family: var(--mono);
  font-size: 12px;
  color: rgba(255,255,255,0.8);
}
.wph-stage-arrow {
  font-size: 20px;
  color: rgba(255,255,255,0.2);
  text-align: center;
  padding: 4px 0;
}
.wph-stage-note {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  text-align: center;
  margin: 12px 0 0;
  font-style: italic;
}

/* Care tie-in */
.wph-care {
  padding: 88px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.wph-care-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: start;
}
.wph-care-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 38px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 20px;
  line-height: 1.2;
}
.wph-care-body {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-2);
  margin: 0 0 16px;
}
.wph-care-body:last-of-type { margin-bottom: 28px; }
.wph-care-checklist {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.wph-care-col {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.wph-care-col-label {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
}
.wph-care-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 13px;
  line-height: 1.45;
  color: var(--ink-2);
}
.wph-care-check {
  flex-shrink: 0;
  font-size: 12px;
  padding-top: 1px;
}
.wph-care-check--blue { color: var(--brand-blue); }
.wph-care-check--green { color: var(--brand-green); }

/* Speed tie-in */
.wph-speed {
  padding: 72px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.wph-speed-inner {
  display: flex;
  gap: 40px;
  align-items: flex-start;
}
.wph-speed-badge {
  font-size: 36px;
  flex-shrink: 0;
  width: 72px;
  height: 72px;
  background: rgba(123,192,67,0.12);
  border-radius: var(--r-xl);
  display: grid;
  place-items: center;
}
.wph-speed-text { flex: 1; }
.wph-speed-eyebrow { color: var(--brand-green); }
.wph-speed-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 36px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 16px;
  line-height: 1.15;
}
.wph-speed-body {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-2);
  max-width: 680px;
  margin: 0 0 28px;
}
@media (max-width: 700px) {
  .wph-speed-inner { flex-direction: column; gap: 24px; }
}

/* CTA */
.wph-cta {
  padding: 80px 0;
  background: var(--navy);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.wph-cta-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r-xl);
  padding: 52px 60px;
}
.wph-cta-hl {
  font-family: var(--serif);
  font-size: clamp(22px, 2.8vw, 34px);
  color: white;
  font-weight: 400;
  font-style: italic;
  margin: 0 0 10px;
}
.wph-cta-sub {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  margin: 0;
  max-width: 400px;
}
.wph-cta-related {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.wph-cta-related-label {
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.wph-cta-related-link { font-size: 13px; color: rgba(255,255,255,0.7); text-decoration: none; }
.wph-cta-related-link:hover { color: white; }
.wph-cta-actions { display: flex; gap: 14px; flex-wrap: wrap; flex-shrink: 0; }
.wph-cta-ghost { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.2); }
.wph-cta-ghost:hover { color: white; border-color: rgba(255,255,255,0.5); }

/* Responsive */
@media (max-width: 1100px) {
  .wph-features-grid { grid-template-columns: repeat(2, 1fr); }
  .wph-care-checklist { grid-template-columns: 1fr; }
}
@media (max-width: 960px) {
  .wph-vs-grid { grid-template-columns: 1fr; }
  .wph-staging-inner { grid-template-columns: 1fr; gap: 48px; }
  .wph-care-inner { grid-template-columns: 1fr; gap: 48px; }
  .wph-care-checklist { grid-template-columns: 1fr 1fr; }
  .wph-cta-inner { padding: 40px 32px; flex-direction: column; align-items: flex-start; }
  .wph-spec-strip { width: 100%; }
  .wph-spec { flex: 1; }
}
@media (max-width: 600px) {
  .wph-features-grid { grid-template-columns: 1fr; }
  .wph-care-checklist { grid-template-columns: 1fr; }
  .wph-hero-actions { flex-direction: column; align-items: flex-start; }
  .wph-spec-strip { flex-direction: column; }
  .wph-spec { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.12); }
  .wph-spec:last-child { border-bottom: none; }
}
</style>
