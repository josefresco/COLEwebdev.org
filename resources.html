<style>
/* ── Resources page ── */

.res-hero {
  padding: 100px 0 56px;
  background: var(--paper);
  border-bottom: 1px solid var(--line);
}
.res-hero-hl {
  font-family: var(--serif);
  font-size: clamp(34px, 5vw, 56px);
  line-height: 1.08;
  color: var(--ink);
  font-weight: 400;
  margin: 12px 0 18px;

}
.res-hero-sub {
  font-size: 16px;
  line-height: 1.68;
  color: var(--ink-2);
  max-width: 640px;
  margin: 0;
}

.res-section { padding: var(--pad-section) 0; background: var(--paper-2); }
.res-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--gap-card);
}

.res-card {
  display: flex;
  flex-direction: column;
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 26px 24px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s ease, transform 0.2s ease;
}
.res-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

.res-card-glyph {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--navy);
  color: var(--brand-green);
  font-size: 20px;
  margin-bottom: 16px;
}
.res-card-title {
  font-family: var(--serif);
  font-size: 19px;
  line-height: 1.3;
  color: var(--ink);
  margin: 0 0 8px;
}
.res-card-desc {
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink-2);
  margin: 0 0 18px;
  flex: 1;
}
.res-card-cta {
  font-size: 13px;
  font-weight: 500;
  color: var(--brand-blue);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  text-decoration: none;
  transition: gap 0.15s ease;
}
.res-card-cta:hover { gap: 9px; }

.res-more {
  margin-top: 48px;
  padding: 44px;
  background: var(--navy);
  border-radius: var(--r-xl);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.res-more-text { font-family: var(--serif); font-size: clamp(20px, 2.5vw, 28px); color: white; line-height: 1.3; margin: 0; }
.res-more-text em { color: var(--brand-green); }

@media (max-width: 960px) {
  .res-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 580px) {
  .res-grid { grid-template-columns: 1fr; }
