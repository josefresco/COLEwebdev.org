<style>
/* ── Consulting page ── */

.cn-hero {
  position: relative;
  overflow: hidden;
  min-height: 56vh;
  display: flex;
  align-items: center;
}
.cn-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 65% 60% at 108% -8%, rgba(123,192,67,0.22), transparent 55%),
    radial-gradient(ellipse 55% 65% at -8% 108%, rgba(14,90,160,0.20), transparent 55%),
    linear-gradient(150deg, #060D1A 0%, #0A1E38 55%, #0C1A30 100%);
}
.cn-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.018) 59px, rgba(255,255,255,0.018) 60px),
    repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.018) 59px, rgba(255,255,255,0.018) 60px);
}
.cn-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 100px 0 80px;
}
.cn-eyebrow { color: rgba(255,255,255,0.6); }
.cn-hero-hl {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 76px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1px;
}
.cn-hero-hl em { color: #7BC043; font-style: italic; }
.cn-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.72);
  max-width: 560px;
  margin: 0 0 36px;
}
.cn-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.cn-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
.cn-ghost:hover { border-color: rgba(255,255,255,0.7); color: white; }
.cn-tags { display: flex; gap: 10px; margin-top: 36px; flex-wrap: wrap; }
.cn-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7);
}

/* What we offer */
.cn-offers {
  padding: 80px 0;
  background: var(--paper);
}
.cn-offers-hd { margin-bottom: 48px; }
.cn-offers-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.cn-offers-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 22px;
}
.cn-offer-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 36px;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.cn-offer-icon {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 19px;
  flex-shrink: 0;
}
.cn-offer-title {
  font-family: var(--serif);
  font-size: 24px;
  color: var(--ink);
  font-weight: 400;
}
.cn-offer-body {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-2);
}
.cn-offer-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cn-offer-list li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13.5px;
  color: var(--ink-2);
}
.cn-offer-list li::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--brand-green);
  flex-shrink: 0;
}

/* Who it's for */
.cn-who {
  padding: 80px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.cn-who-hd { margin-bottom: 48px; }
.cn-who-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.cn-who-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}
.cn-who-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 22px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.cn-who-glyph {
  font-size: 22px;
  line-height: 1;
  color: var(--brand-green);
}
.cn-who-title {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--ink);
  font-weight: 400;
  line-height: 1.3;
}
.cn-who-body {
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink-2);
}

/* Stats */
.cn-stats {
  padding: 64px 0;
  background: var(--navy);
}
.cn-stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}
.cn-stat {
  padding: 32px 40px;
  border-right: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cn-stat:last-child { border-right: none; }
.cn-stat-num {
  font-family: var(--serif);
  font-size: clamp(36px, 4.5vw, 56px);
  color: #7BC043;
  font-style: italic;
  line-height: 1;
}
.cn-stat-label {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  line-height: 1.45;
  max-width: 200px;
}

/* Testimonial */
.cn-testi {
  padding: 80px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.cn-testi-inner {
  max-width: 760px;
  margin: 0 auto;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}
.cn-quote-mark {
  font-family: var(--serif);
  font-size: 96px;
  line-height: 0.6;
  color: var(--brand-green);
  font-style: italic;
  user-select: none;
}
.cn-quote {
  font-family: var(--serif);
  font-size: clamp(20px, 2.5vw, 28px);
  line-height: 1.5;
  color: var(--ink);
  font-weight: 400;
  margin: 0;
  font-style: italic;
}
.cn-testi-meta { display: flex; flex-direction: column; gap: 4px; align-items: center; }
.cn-testi-name { font-weight: 600; font-size: 15px; color: var(--ink); }
.cn-testi-role { font-size: 13px; color: var(--muted); }

/* How it works */
.cn-how {
  padding: 80px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.cn-how-hd { margin-bottom: 48px; }
.cn-how-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 0;
}
.cn-how-steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  counter-reset: step;
}
.cn-step {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
}
.cn-step-num {
  font-family: var(--serif);
  font-size: 42px;
  line-height: 1;
  font-style: italic;
  color: var(--line-2);
}
.cn-step-title {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--ink);
  font-weight: 400;
}
.cn-step-body {
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink-2);
}

/* CTA */
.cn-cta {
  padding: 80px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.cn-cta-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
}
.cn-cta-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 38px);
  color: var(--ink);
  font-weight: 400;
  margin: 0 0 8px;
  font-style: italic;
}
.cn-cta-sub { font-size: 15px; color: var(--ink-2); margin: 0; }

/* Responsive */
@media (max-width: 960px) {
  .cn-offers-grid { grid-template-columns: 1fr; }
  .cn-who-grid { grid-template-columns: repeat(2, 1fr); }
  .cn-how-steps { grid-template-columns: repeat(2, 1fr); }
  .cn-stats-row { grid-template-columns: 1fr; }
  .cn-stat { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .cn-stat:last-child { border-bottom: none; }
  .cn-cta-inner { flex-direction: column; align-items: flex-start; }
}
@media (max-width: 560px) {
  .cn-who-grid { grid-template-columns: 1fr; }
  .cn-how-steps { grid-template-columns: 1fr; }
  .cn-hero-actions { flex-direction: column; align-items: flex-start; }
}
</style>
