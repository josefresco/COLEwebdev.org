<style>
/* ── Industries hub page ── */

/* Hero */
.ih-hero {
  position: relative;
  overflow: hidden;
  min-height: 48vh;
  display: flex;
  align-items: center;
}
.ih-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 100% 0%, rgba(33,146,188,0.2), transparent 55%),
    radial-gradient(ellipse 50% 60% at 0% 100%, rgba(92,192,53,0.12), transparent 55%),
    linear-gradient(145deg, #0A1628 0%, #0E2A4A 60%, #061020 100%);
}
.ih-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,0.014) 79px, rgba(255,255,255,0.014) 80px),
    repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.014) 79px, rgba(255,255,255,0.014) 80px);
}
.ih-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 100px 0 80px;
}
.ih-eyebrow { color: rgba(255,255,255,0.55); }
.ih-hero-hl {
  font-family: var(--serif);
  font-size: clamp(42px, 6.5vw, 80px);
  line-height: 1.04;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1.5px;
}
.ih-hero-hl em { font-style: italic; color: #5CC035; }
.ih-hero-sub {
  font-size: 17px;
  line-height: 1.68;
  color: rgba(255,255,255,0.68);
  max-width: 560px;
  margin: 0;
}

/* Card grid */
.ih-body {
  padding: var(--pad-section) 0;
  background: var(--paper-2);
}
.ih-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.ih-card {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 26px 24px;
  text-decoration: none;
  color: var(--ink);
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s;
}
.ih-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--brand-blue);
  transform: translateY(-2px);
}
.ih-card-body { flex: 1; }
.ih-card-name {
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  margin: 0 0 8px;
  line-height: 1.25;
}
.ih-card-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  margin: 0;
}
.ih-card-arrow {
  font-family: var(--mono);
  font-size: 16px;
  color: var(--brand-blue);
  flex-shrink: 0;
  margin-top: 2px;
}

/* CTA */
.ih-cta-section { padding: var(--pad-section) 0; background: white; }
.ih-cta {
  background: linear-gradient(135deg, #0A1628 0%, #0E2A4A 100%);
  border-radius: var(--r-xl);
  padding: 64px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 40px;
  align-items: center;
}
.ih-cta-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 38px);
  color: white;
  margin: 0 0 12px;
  font-weight: 400;
}
.ih-cta-sub {
  color: rgba(255,255,255,0.6);
  font-size: 15px;
  line-height: 1.65;
  max-width: 48ch;
  margin: 0;
}
.ih-cta-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

/* Responsive */
@media (max-width: 900px) {
  .ih-grid { grid-template-columns: repeat(2, 1fr); }
  .ih-cta { grid-template-columns: 1fr; padding: 40px 32px; }
  .ih-cta-actions { flex-direction: row; align-items: flex-start; }
}
@media (max-width: 580px) {
  .ih-grid { grid-template-columns: 1fr; }
  .ih-cta-actions { flex-direction: column; }
}
