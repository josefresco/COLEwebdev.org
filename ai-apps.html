  "provider": { "@type": "ProfessionalService", "name": "COLEwebdev", "url": "https://colewebdev.org/" },

<style>
/* ── AI Studio page ── */

/* Hero */
.ai-hero {
  position: relative;
  overflow: hidden;
  min-height: 56vh;
  display: flex;
  align-items: center;
}
.ai-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 80% at 100% 0%, rgba(123,192,67,0.22), transparent 55%),
    radial-gradient(ellipse 50% 60% at 0% 100%, rgba(242,107,31,0.12), transparent 55%),
    linear-gradient(150deg, #0A1F36 0%, #0E2A4A 50%, #122E52 100%);
}
.ai-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.025) 39px, rgba(255,255,255,0.025) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.025) 39px, rgba(255,255,255,0.025) 40px);
}
.ai-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 100px 0 80px;
}
.ai-eyebrow { color: rgba(255,255,255,0.6); }
.ai-hero-hl {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 76px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 20px;
  letter-spacing: -1px;
}
.ai-hero-hl em { color: #7BC043; font-style: italic; }
.ai-hero-sub {
  font-size: 17px;
  line-height: 1.65;
  color: rgba(255,255,255,0.72);
  max-width: 580px;
  margin: 0 0 36px;
}
.ai-hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.ai-ghost { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
.ai-ghost:hover { border-color: rgba(255,255,255,0.7); color: white; }
.ai-hero-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 40px; }
.ai-hero-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 5px 12px;
  border-radius: 999px;
}

/* Philosophy */
.ai-phil {
  padding: 88px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.ai-phil-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: start;
}
.ai-phil-hl {
  font-family: var(--serif);
  font-size: clamp(26px, 3.2vw, 42px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 24px;
  line-height: 1.15;
}
.ai-phil-p {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-2);
  margin: 0 0 18px;
}
.ai-phil-pull {
  background: var(--navy);
  border-radius: var(--r-xl);
  padding: 32px 36px;
  margin-bottom: 24px;
}
.ai-phil-quote {
  font-family: var(--serif);
  font-size: clamp(18px, 2.2vw, 24px);
  color: #7BC043;
  font-style: italic;
  line-height: 1.4;
  margin-bottom: 16px;
}
.ai-phil-attr {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}
.ai-phil-principles {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.ai-phil-principle {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  background: white;
  border: 1px solid var(--line);
  border-radius: 10px;
}
.ai-phil-n {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--brand-green);
  letter-spacing: 0.1em;
  flex-shrink: 0;
}
.ai-phil-text {
  font-size: 14px;
  color: var(--ink);
}

/* What we build */
.ai-builds {
  padding: 80px 0;
  background: var(--navy);
  border-top: 1px solid rgba(255,255,255,0.06);
}
.ai-builds-hd { margin-bottom: 48px; }
.ai-builds .eyebrow { color: rgba(255,255,255,0.5); }
.ai-builds-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: white;
  font-weight: 400;
  margin: 8px 0 0;
}
.ai-builds-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.ai-build-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.22s, box-shadow 0.22s;
}
.ai-build-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.ai-build-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 18px;
  flex-shrink: 0;
}
.ai-build-title { font-family: var(--serif); font-size: 20px; color: var(--ink); font-weight: 400; }
.ai-build-body { font-size: 13.5px; line-height: 1.65; color: var(--ink-2); flex: 1; }

/* AI in our process */
.ai-process {
  padding: 88px 0;
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.ai-process-hd { margin-bottom: 52px; max-width: 680px; }
.ai-process-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 16px;
}
.ai-process-p {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-2);
  margin: 0;
}
.ai-process-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.ai-process-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.ai-process-glyph {
  font-size: 22px;
  color: var(--brand-green);
  line-height: 1;
}
.ai-process-label {
  font-family: var(--serif);
  font-size: 19px;
  color: var(--ink);
  font-weight: 400;
}
.ai-process-detail {
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink-2);
}

/* Models */
.ai-models {
  background: var(--navy);
  padding: 80px 0;
}
.ai-models-hd { margin-bottom: 48px; }
.ai-models-hl {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vw, 44px);
  color: white;
  font-weight: 400;
  margin: 8px 0 12px;
}
.ai-models-sub {
  font-size: 15px;
  color: rgba(255,255,255,0.55);
  margin: 0;
}
.ai-models-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.ai-model-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r-xl);
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.ai-model-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ai-model-name {
  font-family: var(--serif);
  font-size: 22px;
  color: white;
  font-weight: 400;
}
.ai-model-desc {
  font-size: 14px;
  line-height: 1.65;
  color: rgba(255,255,255,0.6);
}

/* Josiah lead */
.ai-lead {
  padding: 88px 0;
  background: var(--paper-2);
  border-top: 1px solid var(--line);
}
.ai-lead-grid {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 64px;
  align-items: start;
}
.ai-lead-photo-wrap { flex-shrink: 0; }
.ai-lead-photo {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid white;
  box-shadow: var(--shadow-md);
  display: block;
}
.ai-lead-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 38px);
  color: var(--ink);
  font-weight: 400;
  margin: 8px 0 24px;
  line-height: 1.2;
}
.ai-lead-p {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-2);
  margin: 0 0 16px;
}
.ai-lead-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}
.ai-lead-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--brand-green);
  border: 1px solid rgba(123,192,67,0.35);
  background: rgba(123,192,67,0.07);
  padding: 5px 12px;
  border-radius: 999px;
}

/* AIEO cross-sell */
.ai-aieo {
  padding: 80px 0;
  background: linear-gradient(150deg, rgba(123,192,67,0.09) 0%, rgba(123,192,67,0.03) 60%, transparent 100%),
    var(--paper);
  border-top: 3px solid var(--brand-green);
}
.ai-aieo-inner {
  max-width: 780px;
}
.ai-aieo-top {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.ai-aieo-pill {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: rgba(242,107,31,0.12);
  color: #D05A12;
  border: 1px solid rgba(242,107,31,0.3);
  padding: 4px 12px;
  border-radius: 999px;
}
.ai-aieo-eyebrow { color: var(--muted); }
.ai-aieo-hl {
  font-family: var(--serif);
  font-size: clamp(30px, 4vw, 52px);
  color: var(--ink);
  font-weight: 400;
  margin: 0 0 24px;
  line-height: 1.1;
}
.ai-aieo-p {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-2);
  margin: 0 0 16px;
}

/* CTA */
.ai-cta { padding: 80px 0; background: var(--navy); }
.ai-cta-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--r-xl);
  padding: 56px 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
}
.ai-cta-hl {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 38px);
  color: white;
  font-weight: 400;
  margin: 0 0 10px;
  font-style: italic;
}
.ai-cta-sub { font-size: 15px; color: rgba(255,255,255,0.65); margin: 0; max-width: 420px; }
.ai-cta-actions { display: flex; gap: 14px; flex-wrap: wrap; flex-shrink: 0; }

/* Responsive */
@media (max-width: 960px) {
  .ai-phil-grid { grid-template-columns: 1fr; gap: 40px; }
  .ai-builds-grid { grid-template-columns: repeat(2, 1fr); }
  .ai-process-grid { grid-template-columns: repeat(2, 1fr); }
  .ai-models-grid { grid-template-columns: 1fr; gap: 16px; }
  .ai-lead-grid { grid-template-columns: 1fr; gap: 32px; }
  .ai-lead-photo { width: 140px; height: 140px; }
  .ai-cta-card { padding: 40px 32px; flex-direction: column; align-items: flex-start; }
}
@media (max-width: 640px) {
  .ai-builds-grid { grid-template-columns: 1fr; }
  .ai-process-grid { grid-template-columns: 1fr; }
  .ai-hero-actions { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
