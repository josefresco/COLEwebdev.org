<style>
/* ── Accessibility page (ac-) ── */
.ac-hero {
  position: relative;
  overflow: hidden;
  min-height: 28vh;
  display: flex;
  align-items: center;
}
.ac-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 50% 55% at 100% 0%, rgba(92,192,53,0.14), transparent 55%),
    radial-gradient(ellipse 45% 50% at 0% 100%, rgba(14,42,74,0.22), transparent 55%),
    linear-gradient(145deg, #061828 0%, #0E2A4A 100%);
}
.ac-hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,0.012) 79px, rgba(255,255,255,0.012) 80px),
    repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.012) 79px, rgba(255,255,255,0.012) 80px);
}
.ac-hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 72px 0 56px;
}
.ac-eyebrow { color: rgba(255,255,255,0.5); }
.ac-hero-hl {
  font-family: var(--serif);
  font-size: clamp(32px, 5vw, 58px);
  line-height: 1.05;
  color: white;
  font-weight: 400;
  margin: 12px 0 14px;
  letter-spacing: -0.5px;
}
.ac-hero-meta {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.38);
  margin: 0;
}
/* Body layout mirrors privacy page */
.ac-body {
  padding: var(--pad-section) 0;
  background: var(--paper);
}
.ac-layout {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 64px;
  align-items: start;
}
.ac-toc {
  position: sticky;
  top: 100px;
}
.ac-toc-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: block;
}
.ac-toc-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.ac-toc-list a {
  font-size: 13px;
  color: var(--ink-2);
  text-decoration: none;
  padding: 5px 8px;
  border-radius: var(--r-sm);
  display: block;
  transition: background 0.15s, color 0.15s;
  line-height: 1.4;
}
.ac-toc-list a:hover { background: var(--paper-2); color: var(--brand-blue); }
.ac-content { max-width: 680px; }
.ac-section { margin-bottom: 52px; }
.ac-section:last-child { margin-bottom: 0; }
.ac-section-hl {
  font-family: var(--serif);
  font-size: clamp(20px, 2.2vw, 26px);
  color: var(--ink);
  font-weight: 400;
  margin: 0 0 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
  scroll-margin-top: 100px;
}
.ac-p {
  font-size: 15px;
  line-height: 1.8;
  color: var(--ink-2);
  margin: 0 0 14px;
}
.ac-p:last-child { margin-bottom: 0; }
.ac-list {
  margin: 8px 0 14px;
  padding-left: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ac-list li {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-2);
}
.ac-list li strong { color: var(--ink); font-weight: 500; }
.ac-list code {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--paper-2);
  padding: 1px 5px;
  border-radius: 4px;
  color: var(--ink);
}
.ac-contact-block {
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 24px 28px;
  margin-top: 16px;
}
.ac-contact-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 8px;
}
.ac-contact-row:last-child { margin-bottom: 0; }
.ac-contact-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  min-width: 52px;
}
.ac-contact-val { font-size: 14px; color: var(--ink); }
.ac-contact-val a { color: var(--brand-blue); text-decoration: none; }
.ac-contact-val a:hover { text-decoration: underline; }
@media (max-width: 860px) {
  .ac-layout { grid-template-columns: 1fr; gap: 32px; }
  .ac-toc { position: static; display: none; }
  .ac-content { max-width: 100%; }
}
</style>
