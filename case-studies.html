<style>
/* ── Case Studies page ── */

.cs-hero {
  padding: 100px 0 56px;
  background: var(--paper);
  border-bottom: 1px solid var(--line);
}
.cs-hero-hl {
  font-family: var(--serif);
  font-size: clamp(38px, 5.5vw, 64px);
  line-height: 1.05;
  color: var(--ink);
  font-weight: 400;
  margin: 12px 0 18px;
  letter-spacing: -1px;
}
.cs-hero-sub {
  font-size: 16px;
  line-height: 1.68;
  color: var(--ink-2);
  max-width: 640px;
  margin: 0;
}
.cs-hero-sub a { color: var(--brand-blue); }

.cs-section { padding: var(--pad-section) 0; background: var(--paper-2); }
.cs-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--gap-card);
}

.cs-card {
  display: flex;
  flex-direction: column;
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 26px 24px;
  box-shadow: var(--shadow-sm);
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.35s ease, transform 0.35s ease, box-shadow 0.2s ease;
}
.cs-card.in { opacity: 1; transform: translateY(0); }
.cs-card:hover { box-shadow: var(--shadow-md); }

.cs-card-hd {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.cs-card-glyph {
  font-size: 16px;
  color: var(--brand-green);
}
.cs-card-industry {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.cs-card-industry--link { text-decoration: none; }
.cs-card-industry--link:hover { color: var(--brand-blue); }

.cs-card-title {
  font-family: var(--serif);
  font-size: 20px;
  line-height: 1.3;
  color: var(--ink);
  margin: 0 0 4px;
}
.cs-card-loc {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.cs-card-summary {
  font-size: 14.5px;
  line-height: 1.65;
  color: var(--ink-2);
  margin: 0 0 18px;
  flex: 1;
}
.cs-card-cta {
  font-size: 13px;
  font-weight: 500;
  color: var(--brand-blue);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  text-decoration: none;
  transition: gap 0.15s ease;
}
.cs-card-cta:hover { gap: 9px; }

.cs-more {
  margin-top: 48px;
  padding: 44px;
  background: var(--navy);
  border-radius: var(--r-xl);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.cs-more-text { font-family: var(--serif); font-size: clamp(20px, 2.5vw, 28px); color: white; line-height: 1.3; margin: 0; }
.cs-more-text em { color: var(--brand-green); }

@media (max-width: 960px) {
  .cs-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 580px) {
  .cs-grid { grid-template-columns: 1fr; }
}
</style>
